name: Generate SOP Index

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SOP_INDEX.json
        run: |
          echo "[]" > SOP_INDEX.json
          for area in produccion administracion comercial houzz-pro instalacion maquinarias vehiculos ecopower; do
            if [ -d "$area" ]; then
              for dir in "$area"/SOP-*; do
                if [ -d "$dir" ]; then
                  department=$(basename "$dir")
                  keywords=$(echo $department | sed 's/SOP-//' | tr '-' ' ' | tr 'A-Z' 'a-z')
                  url="./$dir/index.html"
                  jq --arg title "" \
                     --arg department "$department" \
                     --arg keywords "$keywords" \
                     --arg url "$url" \
                     '. += [{"title": $title, "department": $department, "keywords": $keywords, "url": $url}]' \
                     SOP_INDEX.json > tmp.json && mv tmp.json SOP_INDEX.json
                fi
              done
            fi
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add SOP_INDEX.json
          git commit -m "Auto update SOP index" || echo "No changes"
          git push
