name: Generate SOP Index

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Descargar el repositorio con token para permitir commits
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # necesario para commits en la misma rama

      # 2️⃣ Instalar jq para generar JSON seguro
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Generar SOP_INDEX.json
      - name: Generate SOP_INDEX.json
        run: |
          echo "[]" > SOP_INDEX.json
          for area in produccion administracion comercial houzz-pro instalacion maquinarias vehiculos ecopower; do
            if [ -d "$area" ]; then
              for dir in "$area"/SOP-*; do
                if [ -d "$dir" ]; then
                  department=$(basename "$dir")
                  keywords=$(echo $department | sed 's/SOP-//' | tr '-' ' ' | tr 'A-Z' 'a-z')
                  url="./$dir/index.html"
                  jq --arg title "" \
                     --arg department "$department" \
                     --arg keywords "$keywords" \
                     --arg url "$url" \
                     '. += [{"title": $title, "department": $department, "keywords": $keywords, "url": $url}]' \
                     SOP_INDEX.json > tmp.json && mv tmp.json SOP_INDEX.json
                fi
              done
            fi
          done

      # 4️⃣ Commit automático (no se necesita git push)
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add SOP_INDEX.json
          git commit -m "Auto update SOP index" || echo "No changes"
