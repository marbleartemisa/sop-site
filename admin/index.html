<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin SOP - ARTEMISA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:'Segoe UI',Arial;
background:url('/sop-site/wall5.png') no-repeat center top;
background-size:cover;
}
.overlay{
background:rgba(0,0,0,0.25);
min-height:100vh;
}
.navbar{
position:sticky;
top:0;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:10px 30px;
color:white;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
display:flex;
align-items:center;
gap:10px;
}
.logo img{height:40px;}
.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;font-weight:bold;}
.stats{display:flex;gap:20px;margin-bottom:20px;}
.card{background:#003366;color:white;padding:10px 20px;border-radius:10px;font-weight:bold;}
.grid-container{max-width:1300px;margin:40px auto;background:white;padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#003366;color:white;}
.estado{padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
.pendiente{background:#fff3cd;color:#856404;}
.tramite{background:#cce5ff;color:#004085;}
.rechazado{background:#f8d7da;color:#721c24;}
.aprobado{background:#d4edda;color:#155724;}
tr.selected{background:#e8f4ff;}
a.file-link{text-decoration:none;font-size:.9rem;display:block;}
.editor{max-width:1200px;margin:20px auto;background:white;padding:25px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);display:none;}
.editor button{margin-right:10px;padding:10px 18px;border:none;border-radius:25px;cursor:pointer;font-weight:bold;}
.btn-tramite{background:#007bff;color:white;}
.btn-aprobar{background:#28a745;color:white;}
.btn-rechazar{background:#dc3545;color:white;}
.btn-eliminar{background:#444;color:white;}
</style>
</head>

<body>
<div class="overlay">

<div class="navbar">
<div class="logo">
<img src="/sop-site/logo.png">
<span>ARTEMISA MARBLE & CABINETS</span>
</div>
<div class="menu">
<a href="/sop-site/">Inicio</a>
<a href="/sop-site/biblioteca/">Biblioteca SOP</a>
</div>
</div>

<div class="grid-container">
<h2>Solicitudes SOP</h2>

<div class="stats">
<div class="card">Pendientes: <span id="contadorPendientes">0</span></div>
</div>

<input type="text" id="buscarSOP" placeholder="Buscar..." style="margin-bottom:10px;padding:8px;width:100%;border-radius:8px;border:1px solid #ccc;">
<select id="filtroDept" style="margin-bottom:20px;padding:8px;border-radius:8px;">
<option value="">Filtrar por departamento</option>
</select>

<table>
<thead>
<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Archivos</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody id="tablaSOP"></tbody>
</table>
</div>

<div class="editor" id="editorPanel">
<h3>Editar solicitud</h3>
<p><b>Empleado:</b> <span id="editEmpleado"></span></p>
<p><b>Departamento:</b> <span id="editDept"></span></p>
<p><b>Objetivo:</b> <span id="editObjetivo"></span></p>
<p><b>Áreas:</b> <span id="editAreas"></span></p>
<p><b>Archivos:</b> <span id="editFiles"></span></p>

<div style="margin-top:15px">
<button class="btn-tramite" onclick="cambiarEstadoSeleccionado('Trámite')"><i class="fa fa-spinner"></i> Trámite</button>
<button class="btn-aprobar" onclick="cambiarEstadoSeleccionado('Aprobado')"><i class="fa fa-check"></i> Aprobar</button>
<button class="btn-rechazar" onclick="cambiarEstadoSeleccionado('Rechazado')"><i class="fa fa-times"></i> Rechazar</button>
<button class="btn-eliminar" onclick="eliminarSeleccionado()"><i class="fa fa-trash"></i> Eliminar</button>
</div>
</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxhA3ZmwXeTn0oGbK77WjSIgoECEBidcNCIa4yGhJrMm72g5-1PhSDqnCmTniYZTqiKMA/exec";

let solicitudes=[];
let selectedIndex=null;

async function cargarSolicitudes(){
  const res=await fetch(SCRIPT_URL);
  const data=await res.json();
  solicitudes=data.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  llenarFiltro();
  renderTabla();
}

function iconoArchivo(link){
  link=link.toLowerCase();
  if(link.includes(".pdf")) return "📄 SOP.pdf";
  if(link.includes(".jpg")||link.includes(".png")) return "🖼 Foto.jpg";
  if(link.includes(".xls")||link.includes(".xlsx")) return "📊 Excel.xlsx";
  return "📎 Archivo";
}

function renderTabla(){
  const tabla=document.getElementById("tablaSOP");
  tabla.innerHTML="";
  let pendientes=0;
  const buscar=document.getElementById("buscarSOP").value.toLowerCase();
  const deptFiltro=document.getElementById("filtroDept").value;

  solicitudes.forEach((sop,index)=>{
    if(sop.estado==="Pendiente") pendientes++;
    let texto=(sop.empleado+sop.objetivo+sop.departamento).toLowerCase();
    if(buscar && !texto.includes(buscar)) return;
    if(deptFiltro && sop.departamento!==deptFiltro) return;

    let estadoClass="pendiente";
    if(sop.estado==="Trámite") estadoClass="tramite";
    if(sop.estado==="Rechazado") estadoClass="rechazado";
    if(sop.estado==="Aprobado") estadoClass="aprobado";

    let archivosHTML="";
    if(sop.links){
      const links=sop.links.split("\n"); // soporte salto de línea
      archivosHTML=links.map(link=>`<a href="${link.trim()}" target="_blank" class="file-link" onclick="event.stopPropagation()">${iconoArchivo(link)}</a>`).join("");
    }

    let fila=document.createElement("tr");
    fila.onclick=()=>seleccionarSolicitud(index,fila);
    fila.innerHTML=`
      <td>${sop.empleado}</td>
      <td>${sop.departamento}</td>
      <td>${sop.objetivo}</td>
      <td>${sop.areas}</td>
      <td>${archivosHTML}</td>
      <td><span class="estado ${estadoClass}">${sop.estado||"Pendiente"}</span></td>
      <td>${new Date(sop.timestamp).toLocaleString()}</td>
    `;
    tabla.appendChild(fila);
  });

  document.getElementById("contadorPendientes").innerText=pendientes;
}

function llenarFiltro(){
  const select=document.getElementById("filtroDept");
  select.innerHTML='<option value="">Filtrar por departamento</option>';
  const departamentos=[...new Set(solicitudes.map(s=>s.departamento))];
  departamentos.forEach(d=>{
    let opt=document.createElement("option");
    opt.value=d;
    opt.innerText=d;
    select.appendChild(opt);
  });
}

function seleccionarSolicitud(index,row){
  selectedIndex=index;
  document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));
  row.classList.add("selected");
  const sop=solicitudes[index];
  document.getElementById("editEmpleado").innerText=sop.empleado;
  document.getElementById("editDept").innerText=sop.departamento;
  document.getElementById("editObjetivo").innerText=sop.objetivo;
  document.getElementById("editAreas").innerText=sop.areas;

  if(sop.links){
    const links=sop.links.split("\n");
    document.getElementById("editFiles").innerHTML=links.map(link=>`<a href="${link.trim()}" target="_blank">${iconoArchivo(link)}</a>`).join("<br>");
  }
  document.getElementById("editorPanel").style.display="block";
}

async function cambiarEstadoSeleccionado(estado){
  if(selectedIndex===null) return;
  const sop=solicitudes[selectedIndex];
  sop.estado=estado;
  renderTabla();
  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({id:sop.id,estado:estado})
  });
}

async function eliminarSeleccionado(){
  if(selectedIndex===null) return;
  if(!confirm("¿Eliminar solicitud?")) return;
  const sop=solicitudes[selectedIndex];
  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({action:"delete",id:sop.id})
  });
  solicitudes.splice(selectedIndex,1);
  selectedIndex=null;
  document.getElementById("editorPanel").style.display="none";
  renderTabla();
}

document.getElementById("buscarSOP").addEventListener("input",renderTabla);
document.getElementById("filtroDept").addEventListener("change",renderTabla);

cargarSolicitudes();
</script>
</body>
</html>
