<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin SOP - ARTEMISA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:'Segoe UI',Arial;background:url('/sop-site/wall5.png') no-repeat center top;background-size:cover;}
.overlay{background:rgba(0,0,0,0.25);min-height:100vh;}
.navbar{position:sticky;top:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);padding:10px 30px;color:white;font-weight:bold;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;font-weight:bold;}
.grid-container{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#003366;color:white;}
.estado{padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
.pendiente{background:#fff3cd;color:#856404;}
.tramite{background:#cce5ff;color:#004085;}
.rechazado{background:#f8d7da;color:#721c24;}
.aprobado{background:#d4edda;color:#155724;}
tr.selected{background:#e8f4ff;}
.editor{max-width:1100px;margin:20px auto;background:white;padding:25px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);display:none;}
.editor h3{margin-top:0;}
.editor button{margin-right:10px;padding:10px 18px;border:none;border-radius:25px;cursor:pointer;font-weight:bold;}
.btn-tramite{background:#007bff;color:white;}
.btn-aprobar{background:#28a745;color:white;}
.btn-rechazar{background:#dc3545;color:white;}
.btn-eliminar{background:#444;color:white;}
.notification{position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:12px;color:white;font-weight:bold;box-shadow:0 5px 20px rgba(0,0,0,0.3);z-index:9999;opacity:0.95;}
.notification.success{background:#28a745;}
.notification.error{background:#dc3545;}
</style>
</head>

<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="/sop-site/logo.png">
    <span>ARTEMISA MARBLE & CABINETS</span>
  </div>
  <div class="menu">
    <a href="/sop-site/">Inicio</a>
    <a href="/sop-site/biblioteca/">Biblioteca SOP</a>
  </div>
</div>

<!-- TABLA SOLICITUDES -->
<div class="grid-container">
<h2>Solicitudes SOP - Administrador</h2>
<input type="text" id="buscarSOP" placeholder="Buscar..." style="margin-bottom:15px;padding:8px;width:100%;border-radius:8px;border:1px solid #ccc;">
<table>
<thead>
<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Estado</th>
<th>Fecha / Hora</th>
<th>Archivos</th>
</tr>
</thead>
<tbody id="tablaSOP"></tbody>
</table>
</div>

<!-- PANEL EDICION -->
<div class="editor" id="editorPanel">
<h3>Editar solicitud</h3>
<p><b>Empleado:</b> <span id="editEmpleado"></span></p>
<p><b>Departamento:</b> <span id="editDept"></span></p>
<p><b>Objetivo:</b> <span id="editObjetivo"></span></p>
<p><b>Áreas:</b> <span id="editAreas"></span></p>

<div style="margin-top:15px">
<button class="btn-tramite" onclick="cambiarEstadoSeleccionado('Trámite')"><i class="fa fa-spinner"></i> Trámite</button>
<button class="btn-aprobar" onclick="cambiarEstadoSeleccionado('Aprobado')"><i class="fa fa-check"></i> Aprobar</button>
<button class="btn-rechazar" onclick="cambiarEstadoSeleccionado('Rechazado')"><i class="fa fa-times"></i> Rechazar</button>
<button class="btn-eliminar" onclick="eliminarSeleccionado()"><i class="fa fa-trash"></i> Eliminar</button>
</div>
</div>

</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyPqhX5zZou4XmrMZSbcbHK8qBSTkdVUCXe7mdKWkEwduNeUZFaj0XBc8CpfNr6eq_P/exec"
let solicitudes=[]
let selectedIndex=null

// Notificación
function mostrarNotificacion(msg,tipo){
  const notif=document.createElement("div")
  notif.className="notification "+tipo
  notif.innerText=msg
  document.body.appendChild(notif)
  setTimeout(()=>notif.remove(),4000)
}

// Cargar solicitudes desde Sheet
async function cargarSolicitudes(){
  try{
    let res = await fetch(SCRIPT_URL+"?accion=listar")
    let data = await res.json()
    solicitudes = data
    renderTabla()
  }catch(err){console.error(err)}
}

// Render tabla
function renderTabla(){
  const tabla=document.getElementById("tablaSOP")
  tabla.innerHTML=""
  const buscar=document.getElementById("buscarSOP").value.toLowerCase()
  solicitudes.forEach((sop,index)=>{
    let texto=(sop.empleado+sop.objetivo+sop.departamento).toLowerCase()
    if(buscar && !texto.includes(buscar)) return

    let estadoClass=""
    switch(sop.estado){
      case "Pendiente": estadoClass="pendiente"; break
      case "Trámite": estadoClass="tramite"; break
      case "Rechazado": estadoClass="rechazado"; break
      case "Aprobado": estadoClass="aprobado"; break
      default: estadoClass="pendiente";
    }

    let archivosHTML=""
    if(sop.archivos && sop.archivos.length>0){
      archivosHTML = sop.archivos.map(f=>`<a href="${f}" target="_blank">📎 ${f.split("/").pop()}</a>`).join("<br>")
    }

    let fila=document.createElement("tr")
    fila.onclick=()=>seleccionarSolicitud(index,fila)
    fila.innerHTML=`
      <td>${sop.empleado}</td>
      <td>${sop.departamento}</td>
      <td>${sop.objetivo}</td>
      <td>${sop.areas}</td>
      <td><span class="estado ${estadoClass}">${sop.estado}</span></td>
      <td>${sop.fecha}</td>
      <td>${archivosHTML}</td>
    `
    tabla.appendChild(fila)
  })
}

// Seleccionar solicitud
function seleccionarSolicitud(index,row){
  selectedIndex=index
  document.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"))
  row.classList.add("selected")
  let sop=solicitudes[index]
  document.getElementById("editEmpleado").innerText=sop.empleado
  document.getElementById("editDept").innerText=sop.departamento
  document.getElementById("editObjetivo").innerText=sop.objetivo
  document.getElementById("editAreas").innerText=sop.areas
  document.getElementById("editorPanel").style.display="block"
}

// Cambiar estado
async function cambiarEstadoSeleccionado(nuevoEstado){
  if(selectedIndex===null) return
  let sop=solicitudes[selectedIndex]
  sop.estado=nuevoEstado
  try{
    await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify({...sop, accion:"actualizar"})
    })
    mostrarNotificacion("Estado actualizado","success")
    cargarSolicitudes()
    document.getElementById("editorPanel").style.display="none"
  }catch(err){console.error(err); mostrarNotificacion("Error actualizando","error")}
}

// Eliminar solicitud
async function eliminarSeleccionado(){
  if(selectedIndex===null) return
  if(!confirm("¿Eliminar solicitud?")) return
  let sop=solicitudes[selectedIndex]
  try{
    await fetch(SCRIPT_URL,{
      method:"POST",
      body: JSON.stringify({...sop, accion:"eliminar"})
    })
    mostrarNotificacion("Solicitud eliminada","success")
    selectedIndex=null
    document.getElementById("editorPanel").style.display="none"
    cargarSolicitudes()
  }catch(err){console.error(err); mostrarNotificacion("Error eliminando","error")}
}

document.getElementById("buscarSOP").addEventListener("input", renderTabla)

cargarSolicitudes()
</script>
</body>
</html>
