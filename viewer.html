<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP Profesional - Artemisa</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.12.313/pdf.min.js"></script>
<style>
body {
  margin: 0;
  background: #e5e7eb;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Contenedor principal */
.viewer {
  max-width: 1200px;
  margin: 20px auto;
  background: white;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  overflow: hidden;
}

/* Topbar */
.topbar {
  background: #003366;
  color: white;
  padding: 10px 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* Contenedor de páginas PDF */
.pdf-container {
  width: 100%;
  padding: 10px 0;
  display: flex;
  flex-direction: column;
  align-items: center; /* centra horizontalmente todas las páginas */
  gap: 20px;
}

/* Cada canvas de página */
.pdf-page {
  border: 1px solid #ccc;
  border-radius: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  max-width: 95%;
}

/* Responsive */
@media (max-width: 768px) {
  .pdf-page {
    max-width: 95%;
  }
}
</style>
</head>
<body>

<div class="viewer">
  <!-- Topbar -->
  <div class="topbar">
    <span>ARTEMISA MARBLE & CABINETS - SOP</span>
    <a href="/sop-site/">⬅ Volver a Biblioteca</a>
  </div>

  <!-- Contenedor PDF -->
  <div class="pdf-container" id="pdfContainer"></div>
</div>

<script>
// Configura el worker de PDF.js (necesario)
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.12.313/pdf.worker.min.js';

// Captura el parámetro "doc" de la URL
const params = new URLSearchParams(window.location.search);
const doc = params.get("doc");

if (doc) {
  const container = document.getElementById("pdfContainer");
  const loadingTask = pdfjsLib.getDocument(doc);

  loadingTask.promise.then(pdf => {
    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      pdf.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 1.5 }); // escala inicial
        const canvas = document.createElement("canvas");
        canvas.className = "pdf-page";
        const context = canvas.getContext("2d");
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = { canvasContext: context, viewport: viewport };
        page.render(renderContext);

        container.appendChild(canvas);
      });
    }
  }).catch(err => {
    container.innerHTML = "<p style='color:red;'>Error cargando el PDF: "+err.message+"</p>";
  });
} else {
  document.getElementById("pdfContainer").innerHTML = "<p style='color:red;'>No se indicó un PDF.</p>";
}
</script>

</body>
</html>
