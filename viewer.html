<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP - Artemisa</title>

<style>
body{
  margin:0;
  background:#f1f5f9;
  font-family:"Segoe UI",Arial,sans-serif;
}

/* TOPBAR */
.topbar{
  background:#0f172a;
  color:white;
  padding:14px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.brand{
  font-weight:600;
  letter-spacing:.4px;
  font-size:15px;
}

.back{
  background:#2563eb;
  color:white;
  padding:6px 14px;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
}

.back:hover{
  background:#3b82f6;
}

/* HEADER DOCUMENTO */
.doc-header{
  max-width:1100px;
  margin:20px auto;
  padding:0 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.doc-title{
  font-size:20px;
  font-weight:600;
  color:#0f172a;
}

.doc-tools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tool{
  background:white;
  border:1px solid #d1d5db;
  padding:6px 12px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

.tool:hover{
  background:#f3f4f6;
}

/* NAV SOP */
.doc-nav{
  max-width:1100px;
  margin:auto;
  padding:0 10px 10px;
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#374151;
}

/* AREA DOCUMENTO */
.doc-area{
  display:flex;
  justify-content:center;
  padding:10px 20px 40px;
}

.doc-frame{
  width:100%;
  max-width:1100px;
  background:white;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.15),
             0 2px 8px rgba(0,0,0,.08);
  overflow:hidden;
}

iframe{
  width:100%;
  height:88vh;
  border:none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .doc-header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .doc-nav{
    flex-direction:column;
    gap:6px;
  }
  iframe{
    height:85vh;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">ARTEMISA MARBLE & CABINETS • SOP LIBRARY</div>
  <a class="back" href="/sop-site/">⬅ Biblioteca</a>
</div>

<div class="doc-header">
  <div class="doc-title" id="title">Documento SOP</div>
  <div class="doc-tools">
    <button class="tool" onclick="openNew()">Abrir</button>
    <button class="tool" onclick="downloadDoc()">Descargar</button>
    <button class="tool" onclick="printDoc()">Imprimir</button>
  </div>
</div>

<div class="doc-nav">
  <div id="prevDoc" onclick="prevSOP()" style="cursor:pointer;">← SOP anterior</div>
  <div id="nextDoc" onclick="nextSOP()" style="cursor:pointer;">SOP siguiente →</div>
</div>

<div class="doc-area">
  <div class="doc-frame">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
// Obtener SOP desde URL
const params = new URLSearchParams(window.location.search);
let doc = params.get("doc");

// Mapa de departamentos legibles
const deptMap = {
  'produccion': 'Carpinteria',
  'instalacion': 'Stone',
  'administracion': 'Administracion',
  'comercial': 'Comercial',
  'houzz-pro': 'Houzz Pro',
  'maquinarias': 'Maquinarias',
  'vehiculos': 'Vehiculos',
  'ecopower': 'Ecopower'
};

const prevBtn = document.getElementById("prevDoc");
const nextBtn = document.getElementById("nextDoc");
const frame = document.getElementById("frame");
const titleEl = document.getElementById("title");

// Cargar SOP_INDEX.json
fetch('SOP_INDEX.json')
  .then(res => res.json())
  .then(data => {
    if(!data.length){
      titleEl.innerText = "No hay SOP disponibles";
      return;
    }

    // Si no hay doc en URL, cargar el primero
    if(!doc) doc = data[0].url;

    const sopList = data.map(s => s.url);
    let currentIndex = sopList.indexOf(doc);
    if(currentIndex === -1) currentIndex = 0;
    doc = sopList[currentIndex]; // asegurar URL válida

    // Cargar iframe y título
    frame.src = doc;
    const currentSOP = data[currentIndex];
    titleEl.innerText = `${deptMap[currentSOP.department] || currentSOP.department} - ${currentSOP.title.toUpperCase()}`;

    // Funciones de navegación
    window.prevSOP = function(){
      if(currentIndex > 0){
        window.location.href = `viewer.html?doc=${sopList[currentIndex-1]}`;
      }
    }
    window.nextSOP = function(){
      if(currentIndex < sopList.length - 1){
        window.location.href = `viewer.html?doc=${sopList[currentIndex+1]}`;
      }
    }

    // Deshabilitar botones si es inicio/fin
    prevBtn.style.opacity = currentIndex === 0 ? 0.5 : 1;
    prevBtn.style.pointerEvents = currentIndex === 0 ? "none" : "auto";
    nextBtn.style.opacity = currentIndex === sopList.length-1 ? 0.5 : 1;
    nextBtn.style.pointerEvents = currentIndex === sopList.length-1 ? "none" : "auto";

  })
  .catch(err => {
    console.error("No se pudo cargar SOP_INDEX.json:", err);
    titleEl.innerText = "Error cargando SOP";
  });

// Funciones herramientas
function openNew(){ if(doc) window.open(doc,"_blank"); }
function downloadDoc(){ if(doc){ const a=document.createElement("a"); a.href=doc; a.download=""; a.click(); } }
function printDoc(){ if(doc) frame.contentWindow.print(); }
</script>

</body>
</html>
