<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP - Artemisa</title>

<style>
/* Estilos generales */
body {
  margin: 0;
  background: #e5e7eb;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Contenedor principal */
.viewer {
  max-width: 1200px;
  margin: 40px auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Topbar */
.topbar {
  background: #003366;
  color: white;
  padding: 12px 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* Contenedor del iframe */
.iframe-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #e5e7eb;
  padding: 40px;
}

/* Estilo del iframe */
.iframe-wrapper iframe {
  width: 80%;
  max-width: 1100px;
  height: 90vh;
  border: none;
  display: block;
}

/* Responsive: en móviles hacer que el iframe ocupe casi todo el ancho */
@media (max-width: 768px) {
  .iframe-wrapper iframe {
    width: 95%;
    height: 70vh;
  }
}
</style>
</head>

<body>

<div class="viewer">
  <!-- Topbar -->
  <div class="topbar">
    <span>ARTEMISA MARBLE & CABINETS - SOP</span>
    <a href="/sop-site/">⬅ Volver a Biblioteca</a>
  </div>

  <!-- Iframe centrado -->
  <div class="iframe-wrapper">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
// Captura el parámetro "doc" de la URL
const params = new URLSearchParams(window.location.search);
const doc = params.get("doc");

// Asigna el archivo al iframe
if (doc) {
  document.getElementById("frame").src = doc;
} else {
  document.getElementById("frame").src = "about:blank";
}
</script>

</body>
</html>
