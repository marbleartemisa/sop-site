<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP - Artemisa</title>

<style>
body {
  margin: 0;
  background: #e5e7eb;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* Contenedor principal */
.viewer {
  max-width: 1200px;
  margin: 20px auto;
  background: white;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  overflow: hidden;
}

/* Topbar */
.topbar {
  background: #003366;
  color: white;
  padding: 10px 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* Contenedor del iframe */
.iframe-wrapper {
  width: 100%;
  background: #e5e7eb;
  padding: 2px; /* borde mínimo */
  display: flex;
  justify-content: center;
  box-sizing: border-box;
}

/* Estilo del iframe */
.iframe-wrapper iframe {
  width: 100%;
  max-width: 1100px; /* ancho máximo del SOP */
  height: 90vh;
  border: 1px solid #ccc; /* borde muy fino */
  border-radius: 4px;
  overflow-y: auto; /* scroll vertical */
  display: block;
}

/* Responsive para móviles */
@media (max-width: 768px) {
  .iframe-wrapper iframe {
    width: 100%;
    max-width: 100%;
    height: 80vh;
  }
}
</style>
</head>

<body>

<div class="viewer">
  <!-- Topbar -->
  <div class="topbar">
    <span>ARTEMISA MARBLE & CABINETS - SOP</span>
    <a href="/sop-site/">⬅ Volver a Biblioteca</a>
  </div>

  <!-- Iframe centrado -->
  <div class="iframe-wrapper">
    <iframe id="frame" scrolling="auto"></iframe>
  </div>
</div>

<script>
// Captura el parámetro "doc" de la URL
const params = new URLSearchParams(window.location.search);
const doc = params.get("doc");

// Asigna el archivo al iframe
if (doc) {
  document.getElementById("frame").src = doc + "#view=FitH"; 
  // "#view=FitH" ajusta la página al ancho del iframe si es PDF
} else {
  document.getElementById("frame").src = "about:blank";
}
</script>

</body>
</html>
