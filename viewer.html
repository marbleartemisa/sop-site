<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP - Artemisa</title>

<style>

body{
margin:0;
background:#f1f5f9;
font-family:"Segoe UI",Arial,sans-serif;
}

/* TOPBAR */

.topbar{
background:#0f172a;
color:white;
padding:14px 28px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.brand{
font-weight:600;
letter-spacing:.4px;
font-size:15px;
}

.back{
background:#2563eb;
color:white;
padding:6px 14px;
border-radius:6px;
text-decoration:none;
font-size:13px;
}

.back:hover{
background:#3b82f6;
}

/* HEADER DOCUMENTO */

.doc-header{
max-width:1100px;
margin:20px auto;
padding:0 10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.doc-title{
font-size:20px;
font-weight:600;
color:#0f172a;
}

.doc-tools{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.tool{
background:white;
border:1px solid #d1d5db;
padding:6px 12px;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

.tool:hover{
background:#f3f4f6;
}

/* NAV SOP */

.doc-nav{
max-width:1100px;
margin:auto;
padding:0 10px 10px;
display:flex;
justify-content:space-between;
font-size:13px;
color:#374151;
}

/* AREA DOCUMENTO */

.doc-area{
display:flex;
justify-content:center;
padding:10px 20px 40px;
}

.doc-frame{
width:100%;
max-width:1100px;
background:white;
border-radius:10px;
box-shadow:
0 10px 30px rgba(0,0,0,.15),
0 2px 8px rgba(0,0,0,.08);
overflow:hidden;
}

iframe{
width:100%;
height:88vh;
border:none;
}

/* RESPONSIVE */

@media(max-width:768px){

.doc-header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.doc-nav{
flex-direction:column;
gap:6px;
}

iframe{
height:85vh;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
ARTEMISA MARBLE & CABINETS • SOP LIBRARY
</div>

<a class="back" href="/sop-site/">⬅ Biblioteca</a>

</div>

<div class="doc-header">

<div class="doc-title" id="title">
Documento SOP
</div>

<div class="doc-tools">

<button class="tool" onclick="openNew()">Abrir</button>
<button class="tool" onclick="downloadDoc()">Descargar</button>
<button class="tool" onclick="printDoc()">Imprimir</button>

</div>

</div>

<div class="doc-nav">

<div id="prevDoc">← SOP anterior</div>
<div id="nextDoc">SOP siguiente →</div>

</div>

<div class="doc-area">

<div class="doc-frame">
<iframe id="frame"></iframe>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const doc = params.get("doc");

if(doc){

document.getElementById("frame").src = doc;

/* TITULO AUTOMATICO */

let name = doc.split("/").pop();
name = name.replace(".html","").replace(/-/g," ");

document.getElementById("title").innerText = name.toUpperCase();

}

/* ABRIR EN NUEVA PESTAÑA */

function openNew(){
window.open(doc,"_blank");
}

/* DESCARGAR */

function downloadDoc(){
const link=document.createElement("a");
link.href=doc;
link.download="";
link.click();
}

/* IMPRIMIR */

function printDoc(){
document.getElementById("frame").contentWindow.print();
}

</script>

</body>
</html>
