<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP - Artemisa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.12.313/pdf.min.js"></script>
<style>
body {
  margin: 0;
  background: #e5e7eb;
  font-family: 'Segoe UI', Arial, sans-serif;
}

.viewer {
  max-width: 1200px;
  margin: 20px auto;
  background: white;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  overflow: hidden;
}

.topbar {
  background: #003366;
  color: white;
  padding: 10px 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.pdf-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 20px 10px;
}

.pdf-page {
  border: 1px solid #ccc;
  border-radius: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 95%;
  height: auto;
}
</style>
</head>

<body>

<div class="viewer">
  <div class="topbar">
    <span>ARTEMISA MARBLE & CABINETS - SOP</span>
    <a href="/sop-site/">⬅ Volver a Biblioteca</a>
  </div>

  <div class="pdf-container" id="pdfContainer"></div>
</div>

<script>
// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.12.313/pdf.worker.min.js';

// Captura el parámetro "doc" de la URL
const params = new URLSearchParams(window.location.search);
let doc = params.get("doc");

// PDF de prueba si no hay doc
if (!doc) {
  doc = "https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf";
}

const container = document.getElementById("pdfContainer");
const loadingTask = pdfjsLib.getDocument(doc);

loadingTask.promise.then(pdf => {
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    pdf.getPage(pageNum).then(page => {
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      // Ajuste automático ancho al contenedor
      const scale = Math.min((container.clientWidth * 0.95) / viewport.width, 1.5);
      const scaledViewport = page.getViewport({ scale: scale });

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      canvas.className = "pdf-page";

      page.render({ canvasContext: context, viewport: scaledViewport });
      container.appendChild(canvas);
    });
  }
}).catch(err => {
  container.innerHTML = `<p style="color:red;">Error cargando el PDF: ${err.message}</p>`;
});

// Ajustar el canvas al redimensionar la ventana
window.addEventListener('resize', () => {
  const canvases = container.querySelectorAll('canvas');
  canvases.forEach(canvas => {
    const originalWidth = canvas.width;
    const originalHeight = canvas.height;
    const newWidth = Math.min(container.clientWidth * 0.95, originalWidth);
    const newHeight = (originalHeight / originalWidth) * newWidth;
    canvas.width = newWidth;
    canvas.height = newHeight;
    const context = canvas.getContext("2d");
    context.clearRect(0,0,newWidth,newHeight);
    // Nota: Re-render de PDF.js para cada página es más preciso, pero este ajuste evita scroll horizontal
  });
});
</script>

</body>
</html>
