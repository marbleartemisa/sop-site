<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor SOP</title>

<style>

body{
margin:0;
background:#e5e7eb;
font-family:'Segoe UI',Arial,sans-serif;
}

.viewer-container{
max-width:1100px;
margin:40px auto;
background:white;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
border-radius:10px;
overflow:hidden;
}

iframe{
width:100%;
height:90vh;
border:none;
}

.topbar{
background:#003366;
color:white;
padding:12px 20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="viewer-container">

<div class="topbar">
ARTEMISA SOP
</div>

<iframe id="sopFrame"></iframe>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const sop = params.get("doc");

document.getElementById("sopFrame").src = sop;

</script>

</body>
</html>
