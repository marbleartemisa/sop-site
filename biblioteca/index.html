<style>
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f0f0f0;
}
.navbar{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);

  color:white;
  font-weight:bold;

  align-items:center;

  text-decoration:none;
  margin-left:25px;
  font-weight:bold;
  transition:0.3s;
}
.navbar .menu a:hover{
  color:#00aaff;
  transform:scale(1.05);
}
.container{
  max-width:1000px;
  margin:50px auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h1{ text-align:center; margin-bottom:20px;}
.sop-list{
  list-style:none;
  padding:0;
}
.sop-list li{
  padding:12px 15px;
  border-bottom:1px solid #ccc;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.sop-list li a{
  text-decoration:none;
  color:#0072C6;
  transition:.3s;
}
.sop-list li a:hover{
  color:#005a9e;
}
</style>
</head>
