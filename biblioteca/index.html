<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca SOP - Artemisa Marble & Cabinets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#f8f8f8; }
.container { max-width:1100px; margin:40px auto; padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:25px; }
.card { background:white; border-radius:15px; padding:20px; text-align:center; text-decoration:none; color:#1f2937; font-weight:600; font-size:1.1rem; box-shadow:0 10px 20px rgba(0,0,0,0.2); transition:0.3s; }
.card:hover { transform:translateY(-5px); box-shadow:0 15px 30px rgba(0,0,0,0.3); }
.card i { font-size:28px; margin-bottom:10px; display:block; color:#005a9e; }
</style>
</head>
<body>

<div class="container">
<a href="sop/comercial.pdf" class="card"><i class="fa-solid fa-chart-line"></i>Comercial</a>
<a href="sop/produccion.pdf" class="card"><i class="fa-solid fa-industry"></i>Producción</a>
<a href="sop/instalacion.pdf" class="card"><i class="fa-solid fa-screwdriver-wrench"></i>Instalación</a>
<a href="sop/administracion.pdf" class="card"><i class="fa-solid fa-briefcase"></i>Administración</a>
<a href="sop/maquinarias.pdf" class="card"><i class="fa-solid fa-gears"></i>Maquinarias</a>
<a href="sop/vehiculos.pdf" class="card"><i class="fa-solid fa-truck"></i>Vehículos</a>
</div>

</body>
</html>
