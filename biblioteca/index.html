<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca SOP - ARTEMISA MARBLE & CABINETS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nuevo&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:url('/sop-site/wall5.png') no-repeat center top;
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.25);
  min-height:100vh;
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  padding:10px 30px;
  color:white;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}
.navbar .logo{
  display:flex;
  align-items:center;
  gap:10px;
}
.navbar .logo img{
  height:40px;
}
.navbar .menu a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-weight:bold;
  transition:0.3s;
}
.navbar .menu a:hover{
  color:#00aaff;
  transform:scale(1.05);
}

/* CONTENEDOR */
.container{
  max-width:1000px;
  margin:50px auto;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  margin-bottom:25px;
  color:#003366;
  font-family:'Nuevo', 'Segoe UI', Arial;
}

/* LISTA SOP */
.sop-list{
  list-style:none;
  padding:0;
  margin:0;
}
.sop-list li{
  padding:12px 15px;
  border-bottom:1px solid #ccc;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.3s;
}
.sop-list li:hover{
  background:rgba(0,0,0,0.05);
  border-radius:8px;
}
.sop-list li a{
  text-decoration:none;
  color:#0072C6;
  transition:.3s;
}
.sop-list li a:hover{
  color:#005a9e;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:30px;
  color:white;
  background:#003366;
  margin-top:50px;
}
</style>
</head>

<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="../logo.png" alt="Logo Artemisa">
    <span>ARTEMISA MARBLE & CABINETS</span>
  </div>
  <div class="menu">
    <a href="../index.html">Inicio</a>
    <a href="../registrar-sop/index.html">Registrar SOP</a>
    <a href="index.html">Biblioteca SOP</a>
  </div>
</div>

<!-- CONTENEDOR -->
<div class="container">
  <h1>Biblioteca de SOP</h1>
  <ul class="sop-list">
    <li>Comercial <a href="../comercial/index.html">Ver</a></li>
    <li>Producción <a href="../produccion/index.html">Ver</a></li>
    <li>Instalación <a href="../instalacion/index.html">Ver</a></li>
    <li>Administración <a href="../administracion/index.html">Ver</a></li>
    <li>Maquinarias <a href="../maquinarias/index.html">Ver</a></li>
    <li>Vehículos <a href="../vehiculos/index.html">Ver</a></li>
    <li>Houzz Pro <a href="../houzz-pro/index.html">Ver</a></li>
  </ul>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 ARTEMISA MARBLE & CABINETS
</div>

</div>
</body>
</html>
