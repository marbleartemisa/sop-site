<style>
  
  
/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background-image:url('/sop-site/wall0.png');
  background-position:center;
  background-repeat:no-repeat;
  background-size:cover;
  background-attachment:fixed;

  color:#1f2937;
}

.overlay{
  background:rgba(0,0,0,0.25);
  min-height:100vh;
}

/* ===== NAVBAR ===== */
.navbar{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  padding:10px 30px;
  color:white;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:40px;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.menu a:hover{
  color:#00aaff;
}

.menu-toggle{
  display:none;
  font-size:1.6rem;
  cursor:pointer;
}

/* ===== BANNER ===== */
.banner{
  text-align:center;
  padding:40px 20px 20px 20px;
  color:white;
}

.banner h1{
  margin:0;
  font-size:2.2rem;
}

.banner p{
  margin:4px 0;
  opacity:0.9;
}

.cta-btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 25px;
  border-radius:30px;
  background:linear-gradient(135deg,#0072C6,#005a9e);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.cta-btn:hover{
  transform:scale(1.05);
}

/* ===== BUSCADOR ===== */
.search-container{
  max-width:950px;
  margin:30px auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.search-container input,
.search-container select{
  width:100%;
  padding:12px 15px;
  border-radius:30px;
  border:none;
  font-size:1rem;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  outline:none;
}

/* ===== SOP TABLE MODERN ===== */

.dept-filter-bar{

max-width:1050px;
margin:20px auto;
padding:0 20px;

display:flex;
flex-wrap:wrap;
gap:10px;

}

.dept-filter{

padding:8px 16px;

border-radius:20px;

border:none;

background:white;

box-shadow:0 6px 14px rgba(0,0,0,0.15);

font-size:.85rem;

cursor:pointer;

transition:.25s;

}

.dept-filter:hover{

transform:scale(1.05);

}

.dept-filter.active{

background:#0072C6;

color:white;

}
  
.sop-info{
background:white;
padding:12px 18px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
font-size:.9rem;
color:#374151;
}
/* CONTENEDOR */

.sop-container{
max-width:1050px;
margin:40px auto 80px auto;
padding:0 20px;
}

/* TARJETA */

.sop-card{
background:white;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
overflow:hidden;
}

/* HEADER */

.sop-card-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 22px;
background:#0f172a;
color:white;
font-weight:600;
font-size:0.9rem;
}

.sop-count{
opacity:.8;
font-weight:400;
}

/* SCROLL */

.table-scroll{
max-height:550px;
overflow-y:auto;
}

/* TABLA */

.sop-table{
width:100%;
border-collapse:collapse;
}

/* CABECERA */

.sop-table thead th{
position:sticky;
top:0;
background:#1e293b;
color:#cbd5e1;
padding:14px 18px;
font-size:.75rem;
letter-spacing:.08em;
text-transform:uppercase;
font-weight:600;
}

/* FILAS */

.sop-table td{
padding:16px 18px;
border-bottom:1px solid #f1f5f9;
font-size:.95rem;
}

.sop-table tbody tr{
transition:.2s;
}

.sop-table tbody tr:nth-child(even){
background:#fafafa;
}

.sop-table tbody tr:hover{
background:#f1f5f9;
transform:translateX(3px);
}

/* TITULO SOP */

.sop-title{
font-weight:600;
color:#0f172a;
}

/* BOTON */

.sop-btn{
display:inline-flex;
align-items:center;
gap:6px;
padding:8px 16px;
border-radius:10px;
background:linear-gradient(135deg,#0072C6,#005a9e);
color:white;
text-decoration:none;
font-size:.85rem;
font-weight:500;
transition:.25s;
}

.sop-btn:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#005a9e,#003f6b);
}

/* SCROLLBAR */

.table-scroll::-webkit-scrollbar{
width:8px;
}

.table-scroll::-webkit-scrollbar-thumb{
background:#cbd5e1;
border-radius:10px;
}
  /* fondo sólido tabla */

.sop-table tbody tr{
background:white;
}

.sop-table tbody tr:nth-child(even){
background:#f8fafc;
}

.sop-table tbody tr:hover{
background:#eef2f7;
}

/* asegurar fondo en celdas */

.sop-table td{
background:inherit;
}
  
  /* ===== VIDEOS ===== */
.video-section{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.video-section iframe,
.video-section video{
  width:100%;
  height:200px;
  border-radius:15px;
  object-fit:cover;
  border:none;
}

/* ===== CARRUSEL PREMIUM LOOP INFINITO (tipo Apple / Tesla) ===== */

.carousel-container-premium{
  max-width:1000px;
  margin:60px auto;
  overflow:hidden;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  position:relative;
}

.carousel-track-premium{
  display:flex;
  gap:18px;
  width:max-content;
  animation:carouselMove 60s linear infinite;
}

.carousel-container-premium:hover .carousel-track-premium{
  animation-play-state:paused;
}

.carousel-slide-premium{
  flex:0 0 300px;
}

.carousel-slide-premium img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  transition:transform .4s, box-shadow .4s;
}

.carousel-slide-premium img:hover{
  transform:scale(1.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* animación infinita */
@keyframes carouselMove{
  from{
    transform:translateX(0);
  }
  to{
    transform:translateX(-50%);
  }
}

/* responsive */

@media(max-width:768px){

.carousel-slide-premium{
  flex:0 0 240px;
}

.carousel-slide-premium img{
  height:160px;
}

}

  }
}
</style>

<script>
/* MENU */
function toggleMenu(){
  document.querySelector('.menu').classList.toggle('show');
}

/* SOP DATA */
let SOP_INDEX = [];

fetch('SOP_INDEX.json?v=' + Date.now())
.then(res => res.json())
.then(data=>{
  SOP_INDEX = data;
  sortByDepartment();
  renderSOP();
});

/* ORDEN */
function sortByDepartment(){
  SOP_INDEX.sort((a,b)=>{
    if(a.department < b.department) return -1;
    if(a.department > b.department) return 1;
    let A = (a.title||"").toLowerCase();
    let B = (b.title||"").toLowerCase();
    if(A < B) return -1;
    if(A > B) return 1;
    return 0;
  });
}

/* RENDER TABLA + SCROLL SOLO DESPUÉS DE 20 FILAS */
function renderSOP(filtered){

  const container = document.getElementById("sopContainer");
  const list = filtered || SOP_INDEX;

  let html = `
  <div class="sop-info">
  Mostrando <strong>${list.length}</strong> SOP
  </div>

  <div class="table-wrapper">

  <table class="sop-table">

  <thead>
  <tr>
  <th onclick="sortTable('department')">Departamento</th>
  <th onclick="sortTable('title')">Procedimiento SOP</th>
  <th>Acción</th>
  </tr>
  </thead>

  <tbody>
  `;

  list.forEach(sop=>{

  html+=`
  <tr>

  <td data-label="Departamento">
  ${getDepartmentBadge(sop.department)}
  </td>

  <td data-label="Procedimiento">
  <span class="sop-title">${sop.title}</span>
  </td>

  <td data-label="Acción">
  <a class="sop-btn" href="/sop-site/viewer.html?doc=${sop.url}">
  <i class="fa-solid fa-eye"></i> Ver
  </a>
  </td>

  </tr>
  `;

  });

  html+=`
  </tbody>
  </table>

  </div>
  `;

  container.innerHTML = html;

}
/* BADGE */

  function getDepartmentBadge(dep){

  // Alias visual
  if(dep === "produccion"){
    dep = "carpinteria";
  }

    if(dep === "maquinarias"){
    dep = "Hardware";
  }

     if(dep === "instalacion"){
    dep = "stone";
  }

  const map = {
    carpinteria:{name:"Carpintería",icon:"fa-hammer"},
    administracion:{name:"Administración",icon:"fa-building"},
    comercial:{name:"Comercial",icon:"fa-chart-line"},
    stone:{name:"Stone",icon:"fa-screwdriver-wrench"},
    maquinarias:{name:"Maquinarias",icon:"fa-gears"},
    medidas:{name:"Medidas",icon:"fa-gears"},
    vehiculos:{name:"Vehículos",icon:"fa-truck"},
    ecopower:{name:"Ecopowertech",icon:"fa-bolt"},
    taller:{name:"Taller",icon:"fa-chart-line"},
    "houzz-pro":{name:"Houzz Pro",icon:"fa-house"}
  };

  const d = map[dep];
  if(!d) return dep;

  return `<span class="dept-badge dept-${dep}">
  <i class="fa-solid ${d.icon}"></i> ${d.name}
  </span>`;
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",filterSOP);
document.getElementById("deptFilter").addEventListener("change",filterSOP);

function filterSOP(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const dept = document.getElementById("deptFilter").value;
  const filtered = SOP_INDEX.filter(sop=>{
    const matchDept = dept==="" || sop.department===dept;
    const matchSearch =
      (sop.title||"").toLowerCase().includes(search) ||
      (sop.keywords||"").toLowerCase().includes(search);
    return matchDept && matchSearch;
  });
  renderSOP(filtered);
}

/* SORT */
function sortTable(field){
  SOP_INDEX.sort((a,b)=>{
    let A = (a[field]||"").toLowerCase();
    let B = (b[field]||"").toLowerCase();
    if(A<B) return -1;
    if(A>B) return 1;
    return 0;
  });
  renderSOP();
}
function filterDept(dep){

const buttons = document.querySelectorAll(".dept-filter");

buttons.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

document.getElementById("deptFilter").value = dep;

filterSOP();

}
function adminLogin(){

const password = prompt("Ingrese contraseña de administrador");

if(password === "Artemisa2026"){   // puedes cambiar la clave

    window.location.href="/sop-site/admin/";

}else{

    alert("Acceso denegado");

}

}
