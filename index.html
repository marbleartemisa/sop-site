<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTEMISA MARBLE & CABINETS - Biblioteca SOP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:url('/sop-site/kitchen15.jpeg') no-repeat center top;
  background-size:cover;
  color:#333;
}

.overlay{
  background:rgba(0,0,0,0.25);
  min-height:100vh;
}

/* ===== NAVBAR ===== */
.navbar{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  padding:10px 30px;
  color:white;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:40px;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.menu a:hover{
  color:#00aaff;
}

.menu-toggle{
  display:none;
  font-size:1.6rem;
  cursor:pointer;
}

/* ===== BANNER ===== */
.banner{
  text-align:center;
  padding:40px 20px 20px 20px;
  color:white;
}

.banner h1{
  margin:0;
  font-size:2.2rem;
}

.banner p{
  margin:4px 0;
  opacity:0.9;
}

.cta-btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 25px;
  border-radius:30px;
  background:linear-gradient(135deg,#0072C6,#005a9e);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.cta-btn:hover{
  transform:scale(1.05);
}

/* ===== BUSCADOR ===== */
.search-container{
  max-width:950px;
  margin:30px auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.search-container input,
.search-container select{
  width:100%;
  padding:12px 15px;
  border-radius:30px;
  border:none;
  font-size:1rem;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  outline:none;
}

/* ===== TABLA SOP ===== */
.sop-container{
  max-width:1100px;
  margin:20px auto 60px auto;
  padding:0 20px;
}

.sop-info{
  color:white;
  margin-bottom:10px;
  font-size:.9rem;
}

/* contenedor scroll solo filas */
.table-wrapper{
  max-height:1000px;
  overflow-y:auto;
  border-radius:14px;
  box-shadow:0 12px 25px rgba(0,0,0,0.25);
  background:white;
}

/* tabla normal escritorio */
.sop-table{
  width:100%;
  border-collapse:collapse;
  table-layout: fixed; 
}

.sop-table th,
.sop-table td{
  padding:13px 16px;
  border-bottom:1px solid #f1f1f1;
  text-align:left;
  vertical-align: middle;
}

.sop-table th{
  background:linear-gradient(135deg,#003366,#005fa3);
  color:white;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:.3px;
  cursor:pointer;
  position: sticky;
  top: 0;
  z-index:2;
}

/* Anchos de columna */
.sop-table th:nth-child(1){ width: 20%; } 
.sop-table th:nth-child(2){ width: 60%; } 
.sop-table th:nth-child(3){ width: 20%; }

/* Hover y filas pares */
.sop-table tbody tr:hover{
  background:#f5f9ff;
  transform:scale(1.01);
}

.sop-table tbody tr:nth-child(even){
  background:#fafafa;
}

/* Scrollbar */
.table-wrapper::-webkit-scrollbar{
  width:10px;
}
.table-wrapper::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:10px;
}

/* ===== BOTON SOP ===== */
.sop-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 16px;
  border-radius:20px;
  background:linear-gradient(135deg,#0072C6,#005a9e);
  color:white;
  font-size:0.85rem;
  font-weight:600;
  text-decoration:none;
  transition: transform 0.3s, box-shadow 0.3s;
  white-space: nowrap;
}

.sop-btn i{
  font-size:0.9rem;
}

.sop-btn:hover{
  transform: scale(1.05);
  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

/* ===== VIDEOS ===== */
.video-section{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.video-section iframe,
.video-section video{
  width:100%;
  height:200px;
  border-radius:15px;
  object-fit:cover;
  border:none;
}

/* ===== CARRUSEL PREMIUM ===== */
.carousel-container-premium {
  max-width: 900px;
  margin: 50px auto;
  position: relative;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}

.carousel-track-premium {
  display: flex;
  gap: 15px;
  transition: transform 0.5s ease;
}

.carousel-slide-premium {
  flex: 0 0 calc(33.333% - 10px);
}

.carousel-slide-premium img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  transition: transform .3s;
}

.carousel-slide-premium img:hover {
  transform: scale(1.05);
}

.carousel-btn {
  position: absolute;
  top:50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border:none;
  color:white;
  font-size:1.2rem;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
  z-index:10;
}

.carousel-btn.prev{
  left:10px;
}

.carousel-btn.next{
  right:10px;
}

/* ===== BADGES ===== */
.dept-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 10px;
  border-radius:12px;
  font-size:0.85rem;
  font-weight:500;
}

.dept-produccion{background:#e0f2fe;color:#0369a1;}
.dept-administracion{background:#ede9fe;color:#5b21b6;}
.dept-comercial{background:#dcfce7;color:#166534;}
.dept-instalacion{background:#fef3c7;color:#92400e;}
.dept-maquinarias{background:#fee2e2;color:#991b1b;}
.dept-vehiculos{background:#e5e7eb;color:#374151;}
.dept-ecopower{background:#cffafe;color:#0e7490;}
.dept-houzz-pro{background:#f3e8ff;color:#7e22ce;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  /* Menu */
  .menu{
    display:none;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    position:absolute;
    top:60px;
    right:0;
    width:200px;
    padding:20px;
  }

  .menu.show{
    display:flex;
  }

  .menu-toggle{
    display:block;
  }

  /* Tabla responsive */
  .sop-table, .sop-table thead, .sop-table tbody, .sop-table th, .sop-table td, .sop-table tr {
    display: block;
  }

  .sop-table thead tr {
    display: none; 
  }

  .sop-table tbody tr {
    margin-bottom: 15px;
    background: #f9f9f9;
    border-radius: 12px;
    padding: 10px;
  }

  .sop-table tbody td {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: none;
    font-size: 0.9rem;
  }

  .sop-table tbody td:before {
    content: attr(data-label);
    font-weight: 600;
    color: #555;
    margin-right: 10px;
    flex: 0 0 40%;
  }
}
</style>
</head>

<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="/sop-site/logo.png">
    <span>ARTEMISA MARBLE & CABINETS</span>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </div>
  <div class="menu">
    <a href="/sop-site/">Inicio</a>
    <a href="/sop-site/registrar-sop/">Registrar SOP</a>
    <a href="/sop-site/biblioteca/">Biblioteca SOP</a>
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <h1>Biblioteca de Procedimientos Operativos Estándar</h1>
  <p>ARTEMISA MARBLE & CABINETS</p>
  <a href="#sopContainer" class="cta-btn">Ver SOP</a>
</div>

<!-- BUSCADOR -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="Buscar SOP...">
  <select id="deptFilter">
    <option value="">Todos los departamentos</option>
    <option value="comercial">Comercial</option>
    <option value="produccion">Producción</option>
    <option value="instalacion">Instalación</option>
    <option value="administracion">Administración</option>
    <option value="maquinarias">Maquinarias</option>
    <option value="vehiculos">Vehículos</option>
    <option value="houzz-pro">Houzz Pro</option>
    <option value="ecopower">Ecopowertech</option>
  </select>
</div>

<!-- TABLA -->
<div class="sop-container" id="sopContainer"></div>

<!-- VIDEOS -->
<div class="video-section">
    <video autoplay muted loop playsinline>
        <source src="/sop-site/seleccion video 5.MP4" type="video/mp4">
    </video>

    <iframe src="https://www.youtube.com/embed/ZaGJEKPt-A0" allowfullscreen></iframe>

    <video autoplay muted loop playsinline>
        <source src="/sop-site/seleccion video super 1.mp4" type="video/mp4">
    </video>
</div>

<!-- CARRUSEL PREMIUM -->
<div class="carousel-container-premium">
    <button class="carousel-btn prev"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="carousel-track-premium">
        <div class="carousel-slide-premium"><img src="/sop-site/ABQM0471.JPG" alt="Imagen 1"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/outlet.png" alt="Outlet"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/VanitiesBath.png" alt="Vanities & Bath"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/IMG_2393.JPG" alt="Imagen 4"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/IHCH5272.JPG" alt="Imagen 5"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/wall1.jpg" alt="Wall 1"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/IMG_4646.jpg" alt="Imagen 7"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/Kitchen.jpg" alt="Kitchen"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/HOPE1380.JPG" alt="Imagen 9"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/JXUQ9396.JPG" alt="Imagen 10"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/POHQ5752.JPG" alt="Imagen 11"></div>
        <div class="carousel-slide-premium"><img src="/sop-site/wall2.jpg" alt="Wall 2"></div>
    </div>
    <button class="carousel-btn next"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<!-- FOOTER -->
<div class="footer" style="text-align:center;color:white;margin:30px 0;">
© 2026 ARTEMISA MARBLE & CABINETS Rev 2.0
</div>
</div>

<script>
/* MENU */
function toggleMenu(){
  document.querySelector('.menu').classList.toggle('show');
}

/* SOP DATA */
let SOP_INDEX = [];

fetch('SOP_INDEX.json?v=3')
.then(res => res.json())
.then(data=>{
  SOP_INDEX = data;
  sortByDepartment();
  renderSOP();
});

/* ORDEN */
function sortByDepartment(){
  SOP_INDEX.sort((a,b)=>{
    if(a.department < b.department) return -1;
    if(a.department > b.department) return 1;
    let A = (a.title||"").toLowerCase();
    let B = (b.title||"").toLowerCase();
    if(A < B) return -1;
    if(A > B) return 1;
    return 0;
  });
}

/* RENDER TABLA + SCROLL SOLO DESPUÉS DE 20 FILAS */
function renderSOP(filtered) {
  const container = document.getElementById("sopContainer");
  const list = filtered || SOP_INDEX;

  const maxVisibleRows = 20;
  const rowHeight = 50;
  const wrapperStyle = list.length > maxVisibleRows
    ? `style="max-height:${rowHeight * maxVisibleRows}px; overflow-y:auto;"`
    : "";

  let html = `<div class="sop-info">
    Mostrando <strong>${list.length}</strong> SOP
  </div>
  <div class="table-wrapper" ${wrapperStyle}>
    <table class="sop-table">
      <thead>
        <tr>
          <th onclick="sortTable('department')">Departamento</th>
          <th onclick="sortTable('title')">Procedimiento SOP</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
  `;

  list.forEach(sop=>{
    html+=`
      <tr>
        <td data-label="Departamento">${getDepartmentBadge(sop.department)}</td>
        <td data-label="Procedimiento">${sop.title}</td>
        <td data-label="Acción">
          <a class="sop-btn" href="/sop-site/viewer.html?doc=${sop.url}">
            <i class="fa-solid fa-eye"></i> Ver
          </a>
        </td>
      </tr>
    `;
  });

  html+=`</tbody></table></div>`;
  container.innerHTML = html;
}

/* BADGE */
function getDepartmentBadge(dep){
  const map = {
    produccion:{name:"Producción",icon:"fa-industry"},
    administracion:{name:"Administración",icon:"fa-building"},
    comercial:{name:"Comercial",icon:"fa-chart-line"},
    instalacion:{name:"Instalación",icon:"fa-screwdriver-wrench"},
    maquinarias:{name:"Maquinarias",icon:"fa-gears"},
    vehiculos:{name:"Vehículos",icon:"fa-truck"},
    ecopower:{name:"Ecopowertech",icon:"fa-bolt"},
    "houzz-pro":{name:"Houzz Pro",icon:"fa-house"}
  };
  const d = map[dep];
  if(!d) return dep;
  return `<span class="dept-badge dept-${dep}"><i class="fa-solid ${d.icon}"></i> ${d.name}</span>`;
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",filterSOP);
document.getElementById("deptFilter").addEventListener("change",filterSOP);

function filterSOP(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const dept = document.getElementById("deptFilter").value;
  const filtered = SOP_INDEX.filter(sop=>{
    const matchDept = dept==="" || sop.department===dept;
    const matchSearch =
      (sop.title||"").toLowerCase().includes(search) ||
      (sop.keywords||"").toLowerCase().includes(search);
    return matchDept && matchSearch;
  });
  renderSOP(filtered);
}

/* SORT */
function sortTable(field){
  SOP_INDEX.sort((a,b)=>{
    let A = (a[field]||"").toLowerCase();
    let B = (b[field]||"").toLowerCase();
    if(A<B) return -1;
    if(A>B) return 1;
    return 0;
  });
  renderSOP();
}

/* CARRUSEL PREMIUM */
const track = document.querySelector('.carousel-track-premium');
const slides = document.querySelectorAll('.carousel-slide-premium');
const btnNext = document.querySelector('.carousel-btn.next');
const btnPrev = document.querySelector('.carousel-btn.prev');

let index = 0;
const totalSlides = slides.length;
const slideWidth = slides[0].offsetWidth + 15;

function moveCarousel(){
  track.style.transform = `translateX(-${index * slideWidth}px)`;
}

btnNext.addEventListener('click', ()=>{
  index++;
  if(index >= totalSlides) index = 0;
  moveCarousel();
});

btnPrev.addEventListener('click', ()=>{
  index--;
  if(index < 0) index = totalSlides-1;
  moveCarousel();
});
</script>
</body>
</html>
