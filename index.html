<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTEMISA MARBLE & CABINETS - SOP</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: url('Luxury.MAINPIC.210404.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
}

/* Barra superior */
.navbar {
    padding: 20px 40px;
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    font-size: 1rem;
}

/* Banner */
.banner {
    text-align: center;
    padding: 50px 20px 10px 20px;
    color: white;
}

.banner h1 {
    margin: 0;
    font-size: 2.8rem;
}

.banner p {
    margin: 5px 0;
    font-size: 1.1rem;
    opacity: 0.9;
}

/* Buscador */
.search-container {
    text-align: center;
    margin: 30px 20px;
}

.search-container input {
    width: 90%;
    max-width: 500px;
    padding: 14px 18px;
    border-radius: 30px;
    border: none;
    font-size: 1rem;
    outline: none;
}

/* Contenedor tarjetas */
.container {
    max-width: 1100px;
    margin: 20px auto 60px auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

/* Tarjetas */
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 30px 20px;
    text-align: center;
    text-decoration: none;
    color: #1f2937;
    font-weight: 600;
    font-size: 1.1rem;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 45px rgba(0,0,0,0.4);
}

/* Footer */
.footer {
    text-align: center;
    padding: 30px;
    color: white;
    opacity: 0.8;
}
</style>
</head>

<body>
<div class="overlay">

<div class="navbar">
    ARTEMISA MARBLE & CABINETS
</div>

<div class="banner">
    <h1>Manual Corporativo de SOP</h1>
    <p>830 W 19TH ST, HIALEAH, FL 33010</p>
    <p>Tel: 305-884-1223</p>
</div>

<div class="search-container">
    <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Buscar departamento...">
</div>

<div class="container" id="cardContainer">
    <a href="comercial" class="card">📄 Comercial</a>
    <a href="produccion" class="card">⚙️ Producción</a>
    <a href="instalacion" class="card">🔧 Instalación</a>
    <a href="administracion" class="card">📊 Administración</a>
    <a href="maquinarias" class="card">🚜 Maquinarias</a>
    <a href="vehiculos" class="card">🚗 Vehículos</a>
    <a href="houzz-pro" class="card">🏠 Houzz Pro</a>
</div>

<div class="footer">
    © 2026 ARTEMISA MARBLE & CABINETS | 830 W 19TH ST, HIALEAH, FL 33010 | Tel: 305-884-1223
</div>

</div>

<script>
function filterCards() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.textContent.toLowerCase();
        if (text.includes(input)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
