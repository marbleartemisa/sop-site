<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARTEMISA SOP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#f4f6f9;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
background:#003366;
padding:12px 20px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.logo img{
height:35px;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:600;
}

.menu a:hover{
opacity:0.8;
}

/* HAMBURGER */

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* BANNER */

.banner{
text-align:center;
padding:40px 20px;
background:linear-gradient(to right,#0072C6,#005a9e);
color:white;
}

.banner h1{
margin:0;
font-size:2.2rem;
}

.banner p{
margin-top:5px;
opacity:0.9;
}

/* TARJETAS DE DEPARTAMENTOS */

.container{
max-width:1000px;
margin:auto;
padding:30px 15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
padding:25px;
text-align:center;
text-decoration:none;
color:#1f2937;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.card i{
font-size:28px;
margin-bottom:10px;
display:block;
color:#005a9e;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* FOOTER */

.footer{
text-align:center;
margin-top:60px;
padding:25px;
background:#003366;
color:white;
}

/* RESPONSIVE */

@media(max-width:768px){

.menu{
display:none;
position:absolute;
top:60px;
left:0;
width:100%;
background:#003366;
flex-direction:column;
text-align:center;
}

.menu a{
padding:15px;
border-top:1px solid rgba(255,255,255,0.2);
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="logo.png">
<span>ARTEMISA SOP</span>
</div>

<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

<div class="menu" id="menu">

<a href="/sop-site/">Inicio</a>

<a href="/sop-site/biblioteca/">
Biblioteca SOP
</a>

<a href="/sop-site/registrar-sop/">
Registrar SOP
</a>

</div>

</div>

<!-- BANNER -->

<div class="banner">

<h1>Sistema de Procedimientos</h1>

<p>ARTEMISA MARBLE & CABINETS</p>

</div>

<!-- DEPARTAMENTOS -->

<div class="container">

<a href="comercial.html" class="card">
<i class="fa-solid fa-handshake"></i>
Departamento Comercial
</a>

<a href="produccion.html" class="card">
<i class="fa-solid fa-industry"></i>
Producción
</a>

<a href="instalacion.html" class="card">
<i class="fa-solid fa-screwdriver-wrench"></i>
Instalación
</a>

<a href="administracion.html" class="card">
<i class="fa-solid fa-briefcase"></i>
Administración
</a>

</div>

<!-- FOOTER -->

<div class="footer">

ARTEMISA MARBLE & CABINETS  
<br>
830 W 19TH ST HIALEAH FL

</div>

<script>

function toggleMenu(){

var menu = document.getElementById("menu");

menu.classList.toggle("active");

}

</script>

</body>
</html>
