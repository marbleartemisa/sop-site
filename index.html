<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTEMISA MARBLE & CABINETS - Biblioteca SOP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:url('/sop-site/kitchen15.jpeg') no-repeat center top;
  background-size:cover;
  color:#1f2937;
}

.overlay{
  background:rgba(0,0,0,0.25);
  min-height:100vh;
}

/* ===== NAVBAR ===== */
.navbar{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  padding:10px 30px;
  color:white;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:40px;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.menu a:hover{
  color:#00aaff;
}

.menu-toggle{
  display:none;
  font-size:1.6rem;
  cursor:pointer;
}

/* ===== BANNER ===== */
.banner{
  text-align:center;
  padding:40px 20px 20px 20px;
  color:white;
}

.banner h1{
  margin:0;
  font-size:2.2rem;
}

.banner p{
  margin:4px 0;
  opacity:0.9;
}

.cta-btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 25px;
  border-radius:30px;
  background:linear-gradient(135deg,#0072C6,#005a9e);
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.cta-btn:hover{
  transform:scale(1.05);
}

/* ===== BUSCADOR ===== */
.search-container{
  max-width:950px;
  margin:30px auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.search-container input,
.search-container select{
  width:100%;
  padding:12px 15px;
  border-radius:30px;
  border:none;
  font-size:1rem;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  outline:none;
}

/* ===== TABLA SOP ===== */
/* ===== SOP TABLE MODERN ===== */

.sop-container{
  max-width:1050px;
  margin:30px auto 70px auto;
  padding:0 20px;
}

.sop-info{
  color:white;
  margin-bottom:12px;
  font-size:.9rem;
  opacity:.9;
}

/* contenedor */
.table-wrapper{
  border-radius:14px;
  overflow:hidden;
  background:white;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* scroll solo filas */
.table-scroll{
  max-height:650px;
  overflow-y:auto;
}

/* tabla */
.sop-table{
  width:100%;
  border-collapse:collapse;
}

/* header */
.sop-table thead{
  background:#0f172a;
}

.sop-table th{
  text-align:left;
  padding:16px 18px;
  font-size:0.8rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#cbd5e1;
  font-weight:600;
  position:sticky;
  top:0;
  background:#0f172a;
}

/* filas */

.sop-table td{
  padding:16px 18px;
  border-bottom:1px solid #f1f5f9;
  font-size:.95rem;
}

/* SOP title */

.sop-title{
  font-weight:500;
  color:#111827;
}

/* hover */

.sop-table tbody tr{
  transition:all .2s ease;
}

.sop-table tbody tr:hover{
  background:#f8fafc;
}

/* columnas */

.sop-table td:last-child{
  text-align:right;
}

/* scrollbar */

.table-scroll::-webkit-scrollbar{
  width:8px;
}

.table-scroll::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:8px;
}
/* Anchos de columna */
.sop-table th:nth-child(1){ width: 20%; } 
.sop-table th:nth-child(2){ width: 60%; } 
.sop-table th:nth-child(3){ width: 20%; }

/* Hover y filas pares */
.sop-table tbody tr:hover{
  background:#f5f9ff;
  transform:scale(1.01);
}

.sop-table tbody tr:nth-child(even){
  background:#fafafa;
}

/* Scrollbar */
.table-wrapper::-webkit-scrollbar{
  width:10px;
}
.table-wrapper::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:10px;
}

/* ===== BOTON SOP ===== */
.sop-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 14px;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:.85rem;
  font-weight:500;
  text-decoration:none;
  transition:.2s;
}

.sop-btn:hover{
  background:#1d4ed8;
}
/* ===== VIDEOS ===== */
.video-section{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.video-section iframe,
.video-section video{
  width:100%;
  height:200px;
  border-radius:15px;
  object-fit:cover;
  border:none;
}

/* ===== CARRUSEL PREMIUM LOOP INFINITO (tipo Apple / Tesla) ===== */

.carousel-container-premium{
  max-width:1000px;
  margin:60px auto;
  overflow:hidden;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  position:relative;
}

.carousel-track-premium{
  display:flex;
  gap:18px;
  width:max-content;
  animation:carouselMove 60s linear infinite;
}

.carousel-container-premium:hover .carousel-track-premium{
  animation-play-state:paused;
}

.carousel-slide-premium{
  flex:0 0 300px;
}

.carousel-slide-premium img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  transition:transform .4s, box-shadow .4s;
}

.carousel-slide-premium img:hover{
  transform:scale(1.06);
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* animación infinita */
@keyframes carouselMove{
  from{
    transform:translateX(0);
  }
  to{
    transform:translateX(-50%);
  }
}

/* responsive */

@media(max-width:768px){

.carousel-slide-premium{
  flex:0 0 240px;
}

.carousel-slide-premium img{
  height:160px;
}

}
  
/* ===== BADGES ===== */
.dept-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:600;
}

/* colores */

.dept-carpinteria{background:#e0f2fe;color:#0369a1;}
.dept-administracion{background:#ede9fe;color:#5b21b6;}
.dept-comercial{background:#dcfce7;color:#166534;}
.dept-stone{background:#fef3c7;color:#92400e;}
.dept-maquinarias{background:#fee2e2;color:#991b1b;}
.dept-vehiculos{background:#e5e7eb;color:#374151;}
.dept-ecopower{background:#cffafe;color:#0e7490;}
.dept-houzz-pro{background:#f3e8ff;color:#7e22ce;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  /* Menu */
  .menu{
    display:none;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    position:absolute;
    top:60px;
    right:0;
    width:200px;
    padding:20px;
  }

  .menu.show{
    display:flex;
  }

  .menu-toggle{
    display:block;
  }

  /* Tabla responsive */
  .sop-table, .sop-table thead, .sop-table tbody, .sop-table th, .sop-table td, .sop-table tr {
    display: block;
  }

  .sop-table thead tr {
    display: none; 
  }

  .sop-table tbody tr {
    margin-bottom: 15px;
    background: #f9f9f9;
    border-radius: 12px;
    padding: 10px;
  }

  .sop-table tbody td {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: none;
    font-size: 0.9rem;
  }

  .sop-table tbody td:before {
    content: attr(data-label);
    font-weight: 600;
    color: #555;
    margin-right: 10px;
    flex: 0 0 40%;
  }
}
</style>
</head>

<script>
/* MENU */
function toggleMenu(){
  document.querySelector('.menu').classList.toggle('show');
}

/* SOP DATA */
let SOP_INDEX = [];

fetch('SOP_INDEX.json?v=' + Date.now())
.then(res => res.json())
.then(data=>{
  SOP_INDEX = data;
  sortByDepartment();
  renderSOP();
});

/* ORDEN */
function sortByDepartment(){
  SOP_INDEX.sort((a,b)=>{
    if(a.department < b.department) return -1;
    if(a.department > b.department) return 1;
    let A = (a.title||"").toLowerCase();
    let B = (b.title||"").toLowerCase();
    if(A < B) return -1;
    if(A > B) return 1;
    return 0;
  });
}

/* RENDER TABLA + SCROLL SOLO DESPUÉS DE 20 FILAS */
function renderSOP(filtered) {

  const container = document.getElementById("sopContainer");
  const list = filtered || SOP_INDEX;

  let html = `
  <div class="sop-info">
  Mostrando <strong>${list.length}</strong> SOP
  </div>

  <div class="table-wrapper">
  <div class="table-scroll">

  <table class="sop-table">

  <thead>
  <tr>
  <th onclick="sortTable('department')">Departamento</th>
  <th onclick="sortTable('title')">Procedimiento SOP</th>
  <th>Acción</th>
  </tr>
  </thead>

  <tbody>
  `;

  list.forEach(sop=>{

  html+=`
  <tr>

  <td data-label="Departamento">
  ${getDepartmentBadge(sop.department)}
  </td>

  <td data-label="Procedimiento">
  <span class="sop-title">${sop.title}</span>
  </td>

  <td data-label="Acción">
  <a class="sop-btn" href="/sop-site/viewer.html?doc=${sop.url}">
  <i class="fa-solid fa-eye"></i> Ver
  </a>
  </td>

  </tr>
  `;

  });

  html+=`
  </tbody>
  </table>

  </div>
  </div>
  `;

  container.innerHTML = html;

}
/* BADGE */

  function getDepartmentBadge(dep){

  // Alias visual
  if(dep === "produccion"){
    dep = "carpinteria";
  }

     if(dep === "instalacion"){
    dep = "stone";
  }

  const map = {
    carpinteria:{name:"Carpintería",icon:"fa-hammer"},
    administracion:{name:"Administración",icon:"fa-building"},
    comercial:{name:"Comercial",icon:"fa-chart-line"},
    stone:{name:"Stone",icon:"fa-screwdriver-wrench"},
    maquinarias:{name:"Maquinarias",icon:"fa-gears"},
    vehiculos:{name:"Vehículos",icon:"fa-truck"},
    ecopower:{name:"Ecopowertech",icon:"fa-bolt"},
    "houzz-pro":{name:"Houzz Pro",icon:"fa-house"}
  };

  const d = map[dep];
  if(!d) return dep;

  return `<span class="dept-badge dept-${dep}">
  <i class="fa-solid ${d.icon}"></i> ${d.name}
  </span>`;
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",filterSOP);
document.getElementById("deptFilter").addEventListener("change",filterSOP);

function filterSOP(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const dept = document.getElementById("deptFilter").value;
  const filtered = SOP_INDEX.filter(sop=>{
    const matchDept = dept==="" || sop.department===dept;
    const matchSearch =
      (sop.title||"").toLowerCase().includes(search) ||
      (sop.keywords||"").toLowerCase().includes(search);
    return matchDept && matchSearch;
  });
  renderSOP(filtered);
}

/* SORT */
function sortTable(field){
  SOP_INDEX.sort((a,b)=>{
    let A = (a[field]||"").toLowerCase();
    let B = (b[field]||"").toLowerCase();
    if(A<B) return -1;
    if(A>B) return 1;
    return 0;
  });
  renderSOP();
}
