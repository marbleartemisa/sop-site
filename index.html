<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARTEMISA SOP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:url('/sop-site/kitchen15.jpeg') center/cover no-repeat;
}

.overlay{
background:rgba(0,0,0,0.35);
min-height:100vh;
}

/* ===== NAVBAR ===== */

.navbar{
position:sticky;
top:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 25px;
color:white;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.logo img{
height:38px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.menu a:hover{
color:#00aaff;
}

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
}

/* ===== MOBILE MENU ===== */

.mobile-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:900;
}

.mobile-overlay.show{
opacity:1;
visibility:visible;
}

@media(max-width:768px){

.menu{
position:fixed;
top:0;
right:-260px;
height:100%;
width:260px;
background:#0b1c2c;
flex-direction:column;
padding-top:80px;
gap:20px;
transition:0.35s;
}

.menu.show{
right:0;
}

.menu a{
padding:12px 25px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu-toggle{
display:block;
}

}

/* ===== BANNER ===== */

.banner{
text-align:center;
padding:70px 20px 30px;
color:white;
}

.banner h1{
font-size:2.6rem;
margin:0;
}

.banner p{
margin:6px 0;
opacity:0.9;
}

.cta-btn{
margin-top:20px;
display:inline-block;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(135deg,#0072C6,#005a9e);
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.cta-btn:hover{
transform:scale(1.05);
}

/* ===== SEARCH ===== */

.search-container{
text-align:center;
margin:35px 20px;
}

.search-container input{
width:90%;
max-width:520px;
padding:15px 20px;
border-radius:40px;
border:none;
font-size:1rem;
}

/* ===== CARDS ===== */

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.95);
border-radius:18px;
padding:30px 20px;
text-align:center;
text-decoration:none;
color:#1f2937;
font-weight:600;
font-size:1.1rem;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
transition:all .4s;
opacity:0;
transform:translateY(40px);
}

.card i{
font-size:30px;
margin-bottom:12px;
display:block;
color:#005a9e;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 25px 45px rgba(0,0,0,0.45);
}

/* ===== FOOTER ===== */

.footer{
text-align:center;
padding:25px;
background:#003366;
color:white;
margin-top:50px;
}

</style>

</head>

<body>

<div class="overlay">

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="/sop-site/logo.png">
<span>ARTEMISA SOP</span>
</div>

<div class="menu-toggle">
<i class="fa-solid fa-bars"></i>
</div>

<div class="menu">

<a href="/sop-site/">Inicio</a>

<a href="/sop-site/registrar-sop/">Registrar SOP</a>

<a href="/sop-site/biblioteca/">Biblioteca SOP</a>

</div>

</div>

<div class="mobile-overlay"></div>

<!-- BANNER -->

<div class="banner">

<h1>PORTAL DE PROCEDIMIENTOS</h1>

<p>ARTEMISA MARBLE & CABINETS</p>

<p>SOP - Standard Operating Procedures</p>

<a href="#cards" class="cta-btn">Ver Departamentos</a>

</div>

<!-- BUSCADOR -->

<div class="search-container">

<input type="text" id="searchInput" placeholder="Buscar departamento..." onkeyup="filterCards()">

</div>

<!-- TARJETAS -->

<div class="container" id="cards">

<a href="/sop-site/comercial/index.html" class="card"><i class="fa-solid fa-chart-line"></i>Comercial</a>

<a href="/sop-site/produccion/index.html" class="card"><i class="fa-solid fa-industry"></i>Producción</a>

<a href="/sop-site/instalacion/index.html" class="card"><i class="fa-solid fa-screwdriver-wrench"></i>Instalación</a>

<a href="/sop-site/administracion/index.html" class="card"><i class="fa-solid fa-briefcase"></i>Administración</a>

<a href="/sop-site/maquinarias/index.html" class="card"><i class="fa-solid fa-gears"></i>Maquinarias</a>

<a href="/sop-site/vehiculos/index.html" class="card"><i class="fa-solid fa-truck"></i>Vehículos</a>

<a href="/sop-site/houzz-pro/index.html" class="card"><i class="fa-solid fa-house"></i>Houzz Pro</a>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 ARTEMISA MARBLE & CABINETS

</div>

</div>

<script>

/* ===== BUSCADOR ===== */

function filterCards(){

let input=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

let text=card.textContent.toLowerCase();

card.style.display=text.includes(input) ? "" : "none";

});

}

/* ===== ANIMACION CARDS ===== */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show");

}

});

});

document.querySelectorAll(".card").forEach(card=>observer.observe(card));

/* ===== MENU MOBILE ===== */

const toggle=document.querySelector(".menu-toggle");

const menu=document.querySelector(".menu");

const overlay=document.querySelector(".mobile-overlay");

toggle.onclick=()=>{

menu.classList.toggle("show");

overlay.classList.toggle("show");

}

overlay.onclick=()=>{

menu.classList.remove("show");

overlay.classList.remove("show");

}

/* cerrar menu al tocar link */

document.querySelectorAll(".menu a").forEach(link=>{

link.onclick=()=>{

menu.classList.remove("show");

overlay.classList.remove("show");

}

});

</script>

</body>
</html>
