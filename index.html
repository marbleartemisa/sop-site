<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:url('/sop-site/kitchen15.jpeg') no-repeat center top;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.25);
min-height:100vh;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);
padding:10px 30px;
color:white;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.menu a:hover{
color:#00aaff;
}

.menu-toggle{
display:none;
font-size:1.6rem;
cursor:pointer;
}

/* BANNER */

.banner{
text-align:center;
padding:40px 20px 20px 20px;
color:white;
}

.banner h1{
margin:0;
font-size:2.2rem;
}

.banner p{
margin:4px 0;
opacity:0.9;
}

.cta-btn{
display:inline-block;
margin-top:15px;
padding:10px 25px;
border-radius:30px;
background:linear-gradient(135deg,#0072C6,#005a9e);
color:white;
text-decoration:none;
font-weight:bold;
}

.cta-btn:hover{
transform:scale(1.05);
}

/* BUSCADOR */

.search-container{
max-width:950px;
margin:30px auto;
padding:0 20px;
display:flex;
flex-direction:column;
gap:15px;
}

.search-container input,
.search-container select{
width:100%;
padding:12px 15px;
border-radius:30px;
border:none;
font-size:1rem;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
outline:none;
}

/* TABLA SOP */

.sop-container{
max-width:1100px;
margin:20px auto 60px auto;
padding:0 20px;
}

.sop-info{
color:white;
margin-bottom:10px;
font-size:.9rem;
}

.sop-table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.96);
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.sop-table th{
background:#003366;
color:white;
padding:14px;
text-align:left;
cursor:pointer;
font-size:.9rem;
}

.sop-table td{
padding:12px 14px;
border-bottom:1px solid #e5e7eb;
font-size:.9rem;
}

.sop-table tr:hover{
background:#f1f5f9;
}

.sop-link{
color:#005a9e;
font-weight:bold;
text-decoration:none;
}

.sop-link:hover{
text-decoration:underline;
}

/* VIDEOS */

.video-section{
max-width:1100px;
margin:40px auto;
padding:0 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.video-section iframe,
.video-section video{
width:100%;
height:200px;
border-radius:15px;
object-fit:cover;
border:none;
}

/* ===== CARRUSEL PREMIUM LOOP INFINITO CON FLECHAS ===== */
.carousel-container-premium {
  max-width: 900px;
  margin: 50px auto;
  position: relative;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}
.carousel-track-premium {
  display: flex;
  gap: 15px;
  animation: slide-loop 40s linear infinite;
}
.carousel-slide-premium {
  flex: 0 0 calc(33.333% - 10px);
}
.carousel-slide-premium img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  transition: transform .3s;
}
.carousel-slide-premium img:hover {
  transform: scale(1.05);
}
.carousel-container-premium:hover .carousel-track-premium {
  animation-play-state: paused;
}
/* FLECHAS */
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 1.8rem;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 10;
  transition: background .3s;
}
.carousel-btn:hover {
  background: rgba(0,0,0,0.8);
}
.carousel-btn.prev { left: 10px; }
.carousel-btn.next { right: 10px; }

@keyframes slide-loop {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
/* RESPONSIVE */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
background:rgba(0,0,0,0.9);
position:absolute;
top:60px;
right:0;
width:200px;
padding:20px;
}

.menu.show{
display:flex;
}

.menu-toggle{
display:block;
}

}

</style>
</head>

<script>

/* MENU */

function toggleMenu(){
document.querySelector('.menu').classList.toggle('show');
}

/* SOP DATA */

let SOP_INDEX=[];

fetch('/sop-site/SOP_INDEX.json')
.then(res=>res.json())
.then(data=>{
SOP_INDEX=data;
renderSOP();
});

/* RENDER */

function renderSOP(filtered){

const container=document.getElementById("sopContainer");

const list=filtered||SOP_INDEX;

if(list.length===0){
container.innerHTML="<p style='color:white;text-align:center'>No se encontraron SOP</p>";
return;
}

let html=`

<div class="sop-info">
Mostrando <strong>${list.length}</strong> SOP
</div>

<table class="sop-table">

<thead>

<tr>

<th onclick="sortTable('title')">SOP</th>
<th onclick="sortTable('department')">Departamento</th>
<th>Descripción</th>
<th></th>

</tr>

</thead>

<tbody>
`;

list.forEach(sop=>{

html+=`

<tr>

<td><strong>${sop.title}</strong></td>

<td>${sop.department}</td>

<td>${sop.desc||""}</td>

<td>
<a class="sop-link" href="${sop.url}">
Ver <i class="fa-solid fa-arrow-right"></i>
</a>
</td>

</tr>

`;

});

html+=`</tbody></table>`;

container.innerHTML=html;

}

/* SEARCH */

function filterSOP(){

const search=document.getElementById("searchInput").value.toLowerCase();

const dept=document.getElementById("deptFilter").value;

const filtered=SOP_INDEX.filter(sop=>{

const matchDept=dept===""||sop.department===dept;

const matchSearch=
sop.title.toLowerCase().includes(search)||
sop.keywords.toLowerCase().includes(search)||
(sop.desc && sop.desc.toLowerCase().includes(search));

return matchDept && matchSearch;

});

renderSOP(filtered);

}

/* SORT */

function sortTable(field){

SOP_INDEX.sort((a,b)=>{

let A=(a[field]||"").toLowerCase();
let B=(b[field]||"").toLowerCase();

if(A<B) return -1;
if(A>B) return 1;
return 0;

});

renderSOP();

}
 // Carrusel Premium con flechas
  const track = document.querySelector('.carousel-track-premium');
  const slides = document.querySelectorAll('.carousel-slide-premium');
  const btnNext = document.querySelector('.carousel-btn.next');
  const btnPrev = document.querySelector('.carousel-btn.prev');

  let scrollAmount = 0;
  const slideWidth = slides[0].offsetWidth + 15;

  btnNext.addEventListener('click', () => {
    scrollAmount += slideWidth;
    if(scrollAmount >= track.scrollWidth / 2) scrollAmount = 0;
    track.scrollTo({ left: scrollAmount, behavior: 'smooth' });
  });

  btnPrev.addEventListener('click', () => {
    scrollAmount -= slideWidth;
    if(scrollAmount < 0) scrollAmount = track.scrollWidth / 2;
    track.scrollTo({ left: scrollAmount, behavior: 'smooth' });
  });
  btnPrev.addEventListener('click', () => {
    scrollAmount -= slideWidth;
    if(scrollAmount < 0) scrollAmount = track.scrollWidth / 2;
    track.scrollTo({ left: scrollAmount, behavior: 'smooth' });
  });


</script>
