<style>

/* ===== FONDO ===== */

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:url('Kitchen11.jpeg') no-repeat center top;
background-size:cover;
}

/* overlay */

.overlay{
background:rgba(0,0,0,0.25);
min-height:100vh;
}

/* ===== NAVBAR FIJA ===== */

.navbar{

position:sticky;
top:0;

background:rgba(0,0,0,0.65);
backdrop-filter:blur(8px);

padding:18px 40px;

color:white;
font-weight:bold;
letter-spacing:1px;
font-size:1rem;

z-index:999;

}

/* ===== BANNER ===== */

.banner{
text-align:center;
padding:60px 20px 20px 20px;
color:white;
}

.banner h1{
margin:0;
font-size:2.6rem;
}

.banner p{
margin:6px 0;
font-size:1.1rem;
opacity:0.9;
}

.cta-btn{

display:inline-block;
margin-top:20px;
padding:12px 28px;
border-radius:30px;

background:linear-gradient(135deg,#0072C6,#005a9e);

color:white;
text-decoration:none;
font-weight:bold;

transition:.3s;

}

.cta-btn:hover{
transform:scale(1.05);
}

/* ===== BUSCADOR ===== */

.search-container{
text-align:center;
margin:30px 20px;
}

.search-container input{

width:90%;
max-width:500px;

padding:14px 18px;

border-radius:30px;

border:none;

font-size:1rem;

outline:none;

}

/* ===== TARJETAS ===== */

.container{

max-width:1100px;
margin:40px auto 60px auto;
padding:20px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;

}

.card{

background:rgba(255,255,255,0.9);

backdrop-filter:blur(10px);

border-radius:18px;

padding:30px 20px;

text-align:center;

text-decoration:none;

color:#1f2937;

font-weight:600;

font-size:1.1rem;

box-shadow:0 15px 35px rgba(0,0,0,0.3);

transition:all .4s;

opacity:0;
transform:translateY(30px);

}

.card i{
font-size:28px;
margin-bottom:10px;
display:block;
color:#005a9e;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{

transform:translateY(-8px);
box-shadow:0 20px 45px rgba(0,0,0,0.4);

}

/* ===== VIDEOS ===== */

.video-section{

max-width:1100px;

margin:40px auto;

padding:0 20px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:20px;

}

.video-section iframe,
.video-section video{

width:100%;
height:200px;
border-radius:15px;
border:none;
object-fit:cover;

}

/* ===== CARRUSEL ===== */

.carousel{

width:100%;
max-width:700px;
margin:40px auto;
overflow:hidden;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.slides{

display:flex;
animation:scroll 45s linear infinite;

}

.slides img{

width:220px;
height:160px;

object-fit:cover;

margin-right:12px;

border-radius:10px;

flex-shrink:0;

transition:transform .4s;

}

.slides img:hover{
transform:scale(1.08);
}

@keyframes scroll{

0%{transform:translateX(0);}
100%{transform:translateX(-50%);}

}

/* ===== FOOTER ===== */

.footer{

text-align:center;

padding:30px;

color:white;

opacity:0.9;

background:#003366;

}

/* ===== MOVIL ===== */

@media(max-width:768px){

.slides img{
width:180px;
height:130px;
}

}

</style>

</head>

<body>

<script>

/* ===== BUSCADOR ===== */

function filterCards(){

let input=document.getElementById("searchInput").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let text=card.textContent.toLowerCase();

if(text.includes(input)){

card.style.display="";

}else{

card.style.display="none";

}

});

}

/* ===== ANIMACION TARJETAS ===== */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show");

}

});

});

document.querySelectorAll(".card").forEach(card=>{
observer.observe(card);
});

</script>
