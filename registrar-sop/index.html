<script>

emailjs.init("iR8ieJnOkI4_sr8TH")

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwXCmWHuByuduROkUoweCmmYMUCsA-cdizy3twM30OAsZyJInkltKoao4zafWUycVTH/exec"

let solicitudes=[]

function toggleMenu(){
document.querySelector('.menu').classList.toggle('show')
}

function mostrarNotificacion(msg,tipo){

const notif=document.createElement("div")

notif.className="notification "+tipo

notif.innerText=msg

document.body.appendChild(notif)

setTimeout(()=>notif.remove(),4000)

}

async function cargarSolicitudes(){

let response=await fetch(SCRIPT_URL+"?action=getSOP")

let data=await response.json()

solicitudes=data

renderTabla()

}

function renderTabla(){

const tabla=document.getElementById("tablaSOP")

tabla.innerHTML=""

solicitudes.forEach((sop,index)=>{

let estadoClass="pendiente"

if(sop.estado=="Trámite")estadoClass="tramite"

if(sop.estado=="Rechazado")estadoClass="rechazado"

if(sop.estado=="Aprobado")estadoClass="aprobado"

let fila=document.createElement("tr")

fila.innerHTML=`

<td>${sop.empleado}</td>
<td>${sop.departamento}</td>
<td>${sop.objetivo}</td>
<td>${sop.areas}</td>
<td>${sop.resumen}</td>
<td><span class="estado ${estadoClass}">${sop.estado}</span></td>
<td>${sop.fecha}</td>

`

tabla.appendChild(fila)

})

}

// autocompletar departamento

document.getElementById("employee").addEventListener("change",function(){

let datos=this.value.split("|")

document.getElementById("departamento").value=datos[3] || ""

})

// envío formulario

document.getElementById("sopForm").addEventListener("submit",async function(e){

e.preventDefault()

let datosEmpleado=document.getElementById("employee").value.split("|")

let nombre=datosEmpleado[0]

let correo=datosEmpleado[1]

let cargo=datosEmpleado[2]

let depto=document.getElementById("departamento").value.trim()

let objetivo=document.getElementById("objetivo").value.trim()

let areas=document.getElementById("areas").value.trim()

let resumen=document.getElementById("resumen").value.trim()

let fechaActual=new Date().toLocaleString()

let nuevo={

empleado:nombre,
correo,
cargo,
departamento:depto,
objetivo,
areas,
resumen,
estado:"Pendiente",
fecha:fechaActual

}

await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({

action:"newSOP",

data:nuevo

})

})

emailjs.send("service_vkt5xuo","template_vc7447e",{

employee:nombre,
department:depto,
cargo:cargo,
objective:objetivo,
areas:areas,
summary:resumen,
date:fechaActual

})

mostrarNotificacion("Solicitud enviada","success")

this.reset()

cargarSolicitudes()

})

cargarSolicitudes()

</script>
