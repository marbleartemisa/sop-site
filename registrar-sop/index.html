<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>SOP Artemisa</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#111;
color:white;
padding:15px;
display:flex;
align-items:center;
}

.hamburger{
font-size:24px;
cursor:pointer;
margin-right:20px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#222;
color:white;
padding:20px;
transition:.3s;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
}

.sidebar.open{
left:0;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

/* FORM */

.form-section{
background:white;
margin:30px;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;

}

button{

background:#007bff;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;

}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="header">

<div class="hamburger" onclick="toggleMenu()">☰</div>

<h2>SOP Artemis Marble</h2>

</div>


<div class="sidebar" id="menu">

<h3>Menú</h3>

<a href="#">Inicio</a>
<a href="#">SOP Comercial</a>
<a href="#">SOP Producción</a>
<a href="#">SOP Administración</a>

</div>


<div class="grid">

<div class="card">Cotización de Ventas</div>
<div class="card">Proceso de Medición</div>
<div class="card">Shopdrawing</div>
<div class="card">Producción Stone</div>

</div>


<div class="form-section">

<h2>Solicitar Nuevo SOP</h2>

<form id="sopForm">

<label>Empleado</label>

<select id="employee">

<option value="">Seleccione</option>

<option value="Damian Molina">Damian Molina</option>
<option value="Carlos Herrera">Carlos Herrera</option>
<option value="Jenny Perez">Jenny Perez</option>
<option value="Alberto Molina">Alberto Molina</option>
<option value="Gabriel Batista">Gabriel Batista</option>
<option value="Yozusi Urdaneta">Yozusi Urdaneta</option>
<option value="Yoandry Perez">Yoandry Perez</option>
<option value="Wendy Romanach">Wendy Romanach</option>
<option value="Rolando Diaz">Rolando Diaz</option>
<option value="Krishna Camila Rojas">Krishna Camila Rojas</option>
<option value="Gregorio Abreu">Gregorio Abreu</option>
<option value="Juan Pablo Molina">Juan Pablo Molina</option>
<option value="Kevin Pastor">Kevin Pastor</option>
<option value="Eliana Pineda">Eliana Pineda</option>
<option value="Otro">Otro</option>

</select>


<label>Departamento</label>

<select id="department">

<option>Ventas</option>
<option>Comercial</option>
<option>Diseño</option>
<option>Medida</option>
<option>Producción</option>
<option>Administración</option>
<option>Control</option>

</select>


<label>Objetivo del SOP</label>

<input id="objective" required>


<label>Áreas involucradas</label>

<input id="areas">


<label>Resumen</label>

<textarea id="summary" rows="5"></textarea>


<button type="submit">Enviar Solicitud</button>

</form>

</div>


<script>

emailjs.init("iR8ieJnOkI4_sr8TH");


function toggleMenu(){

document.getElementById("menu").classList.toggle("open")

}


document.getElementById("sopForm").addEventListener("submit",function(e){

e.preventDefault()

const employee=document.getElementById("employee").value
const department=document.getElementById("department").value
const objective=document.getElementById("objective").value
const areas=document.getElementById("areas").value
const summary=document.getElementById("summary").value

const templateParams={

employee:employee,
department:department,
objective:objective,
areas:areas,
summary:summary,
date:new Date().toLocaleString()

}


emailjs.send(
"service_vkt5xuo",
"template_vc7447e",
templateParams
)

.then(function(){

alert("Solicitud enviada correctamente")

document.getElementById("sopForm").reset()

})

.catch(function(error){

console.log(error)

alert("Error enviando correo")

})

})

</script>

</body>
</html>
