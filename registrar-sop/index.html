<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar SOP - ARTEMISA MARBLE & CABINETS V1</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nuevo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:url('/sop-site/kitchen15.jpeg') no-repeat center top;background-size:cover;}
.overlay{background:rgba(0,0,0,0.25);min-height:100vh;}
.navbar{position:sticky;top:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);padding:10px 30px;color:white;font-weight:bold;display:flex;justify-content:space-between;align-items:center;z-index:999;font-family:'Nuevo','Segoe UI',Arial;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;font-weight:bold;transition:.3s;}
.menu a:hover{color:#00aaff;transform:scale(1.05);}
.menu-toggle{display:none;font-size:1.6rem;cursor:pointer;}
.container{max-width:900px;margin:50px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
h1{text-align:center;margin-bottom:25px;color:#003366;}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-size:1rem;height:46px;}
textarea{height:auto;}
button{padding:12px;border:none;border-radius:30px;background:linear-gradient(135deg,#0072C6,#005a9e);color:white;font-weight:bold;cursor:pointer;transition:.3s;}
button:hover{transform:scale(1.05);}
.grid-container{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#003366;color:white;}
.estado{padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
.pendiente{background:#fff3cd;color:#856404;}
.tramite{background:#cce5ff;color:#004085;}
.rechazado{background:#f8d7da;color:#721c24;}
.aprobado{background:#d4edda;color:#155724;}
.footer{text-align:center;padding:30px;color:white;background:#003366;margin-top:50px;}
@media(max-width:768px){.menu{display:none;flex-direction:column;background:rgba(0,0,0,0.9);position:absolute;top:60px;right:0;width:200px;padding:20px;border-radius:10px 0 0 10px;}.menu.show{display:flex;}.menu-toggle{display:block;}}
</style>
</head>
<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">
<img src="/sop-site/logo.png">
<span>ARTEMISA MARBLE & CABINETS</span>
</div>
<div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
<div class="menu">
<a href="/sop-site/">Inicio</a>
<a href="/sop-site/registrar-sop/">Registrar SOP</a>
<a href="/sop-site/biblioteca/">Biblioteca SOP</a>
</div>
</div>

<!-- FORMULARIO -->
<div class="container">
<h1>Registrar Solicitud de SOP</h1>
<form id="sopForm" enctype="multipart/form-data">

<label>Empleado</label>
<select id="employee" required>
<option value="">Seleccione empleado</option>
<option value="Damian Molina|damian@artemisamarble.com|Presidente|Ventas">Damian Molina - Presidente</option>
<option value="Carlos Herrera|control@artemisamarble.com|Controller|Control">Carlos Herrera - Controller</option>
<option value="Jenny Perez|jenny@artemisamarble.com|Manager|Ventas">Jenny Perez - Manager</option>
<option value="Alberto Molina|frontdesk@artemisamarble.com|Frontdesk|Administracion">Alberto Molina - Frontdesk</option>
<option value="Gabriel Batista|sales@artemisamarble.com|Ventas|Comercial">Gabriel Batista - Ventas</option>
<option value="Yozusi Urdaneta|wood@artemisamarble.com|Shopdrawing|Diseño">Yozusi Urdaneta - Shopdrawing</option>
<option value="Yoandry Perez|yoandry@artemisamarble.com|Manager|Producción">Yoandry Perez - Manager</option>
<option value="Wendy Romanach|accounting@artemisamarble.com|Accounting|Administracion">Wendy Romanach - Accounting</option>
<option value="Rolando Diaz|rolando@artemisamarble.com|Medidor|Medida">Rolando Diaz - Medidor</option>
<option value="Krishna Camila Rojas|jobs@artemisamarble.com|Shopdrawing|Diseño">Krishna Camila Rojas - Shopdrawing</option>
<option value="Gregorio Abreu|stone.production@artemisamarble.com|Medidor|Medida">Gregorio Abreu - Medidor</option>
<option value="Juan Pablo Molina|sales3@artemisamarble.com|Shopdrawing|Diseño">Juan Pablo Molina - Shopdrawing</option>
<option value="Kevin Pastor|sales4@artemisamarble.com|Ventas|Comercial">Kevin Pastor - Ventas</option>
<option value="Eliana Pineda|info@artemisamarble.com|Ventas|Comercial">Eliana Pineda - Ventas</option>
<option value="Otros|otros|otros|otros">Otros</option>
</select>

<input type="text" id="departamento" placeholder="Área / Departamento" required>
<input type="text" id="objetivo" placeholder="Objetivo del SOP" required>
<input type="text" id="areas" placeholder="Áreas o roles involucrados">
<textarea id="resumen" rows="4" placeholder="Resumen de instrucciones"></textarea>
<label>Adjuntar archivos (PDF o imágenes)</label>
<input type="file" id="archivos" multiple>
<button type="submit">Registrar Solicitud</button>
</form>
</div>

<!-- GRID -->
<div class="grid-container">
<h2>Solicitudes SOP</h2>
<table>
<thead>
<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Estado</th>
<th>Fecha / Hora</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaSOP"></tbody>
</table>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 ARTEMISA MARBLE & CABINETS
</div>
</div>

<script>
emailjs.init("iR8ieJnOkI4_sr8TH"); // User ID EmailJS

function toggleMenu(){document.querySelector('.menu').classList.toggle('show')}

let solicitudes = JSON.parse(localStorage.getItem("sopSolicitudes")) || []

function guardar(){localStorage.setItem("sopSolicitudes", JSON.stringify(solicitudes))}

function renderTabla(){
const tabla=document.getElementById("tablaSOP")
tabla.innerHTML=""
solicitudes.forEach((sop,index)=>{
if(sop.estado==="Publicado") return
let estadoClass=""
switch(sop.estado){
case "Pendiente": estadoClass="pendiente"; break;
case "Trámite": estadoClass="tramite"; break;
case "Rechazado": estadoClass="rechazado"; break;
case "Aprobado": estadoClass="aprobado"; break;
default: estadoClass="pendiente";
}
let fila=document.createElement("tr")
fila.innerHTML=`
<td>${sop.empleado}</td>
<td>${sop.departamento}</td>
<td>${sop.objetivo}</td>
<td>${sop.areas}</td>
<td><span class="estado ${estadoClass}">${sop.estado}</span></td>
<td>${sop.fecha}</td>
<td>
<button onclick="cambiarEstado(${index},'Trámite')"><i class="fa fa-spinner"></i></button>
<button onclick="cambiarEstado(${index},'Rechazado')"><i class="fa fa-times"></i></button>
<button onclick="cambiarEstado(${index},'Aprobado')"><i class="fa fa-check"></i></button>
</td>
`
tabla.appendChild(fila)
})
}

function cambiarEstado(i,nuevoEstado){
solicitudes[i].estado=nuevoEstado
guardar()
renderTabla()
}

// Autocompleta departamento
document.getElementById("employee").addEventListener("change", function(){
  let datos = this.value.split("|");
  let departamento = datos[3] || "";
  document.getElementById("departamento").value = departamento;
})

// Archivos a Base64
function archivosA_Base64(files){
  return Promise.all(Array.from(files).map(file=>{
    return new Promise((resolve,reject)=>{
      const reader = new FileReader()
      reader.onload = ()=>resolve({name:file.name, data:reader.result})
      reader.onerror = reject
      reader.readAsDataURL(file)
    })
  }))
}

document.getElementById("sopForm").addEventListener("submit",async function(e){
e.preventDefault()
let datosEmpleado = document.getElementById("employee").value.split("|")
let nombre = datosEmpleado[0]
let correo = datosEmpleado[1]
let cargo = datosEmpleado[2]
let departamentoEmpleado = datosEmpleado[3]

let fechaActual = new Date().toLocaleString()
let nuevo={
empleado:nombre,
correo:correo,
cargo:cargo,
departamento:document.getElementById("departamento").value || departamentoEmpleado,
objetivo:document.getElementById("objetivo").value,
areas:document.getElementById("areas").value,
resumen:document.getElementById("resumen").value,
estado:"Pendiente",
fecha: fechaActual
}
solicitudes.push(nuevo)
guardar()
renderTabla()
this.reset()

let archivosInput = document.getElementById("archivos")
let archivosBase64 = await archivosA_Base64(archivosInput.files)

emailjs.send("service_vkt5xuo","template_vc7447e",{
employee:nombre,
department:document.getElementById("departamento").value || departamentoEmpleado,
cargo:cargo,
objective:document.getElementById("objetivo").value,
areas:document.getElementById("areas").value,
summary:document.getElementById("resumen").value,
date: fechaActual,
attachments: archivosBase64
}).then(()=>{
alert("Solicitud enviada correctamente")
}).catch((error)=>{
console.error(error)
alert("Error enviando correo")
})
})

renderTabla()
</script>
</body>
</html>
