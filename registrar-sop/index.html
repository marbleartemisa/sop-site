<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrar SOP - ARTEMISA</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:url('/sop-site/kitchen15.jpeg') center/cover no-repeat;
}

.overlay{
background:rgba(0,0,0,0.25);
min-height:100vh;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
background:rgba(0,0,0,0.7);
padding:10px 30px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
}

.menu-toggle{
display:none;
font-size:1.6rem;
cursor:pointer;
}

/* FORM */

.container{
max-width:900px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#005a9e;
color:white;
cursor:pointer;
}

/* GRID */

.grid-container{
max-width:1100px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#003366;
color:white;
}

.estado{
padding:6px 12px;
border-radius:20px;
font-size:.8rem;
font-weight:bold;
}

.pendiente{
background:#fff3cd;
}

.tramite{
background:#cce5ff;
}

.rechazado{
background:#f8d7da;
}

.aprobado{
background:#d4edda;
}

/* MOBILE */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:0;
background:#000;
padding:20px;
}

.menu.show{
display:flex;
}

.menu-toggle{
display:block;
}

}

</style>
</head>

<body>

<div class="overlay">

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
<img src="/sop-site/logo.png">
<span>ARTEMISA MARBLE</span>
</div>

<div class="menu-toggle" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

<div class="menu">

<a href="/sop-site/">Inicio</a>
<a href="/sop-site/registrar-sop/">Registrar SOP</a>
<a href="/sop-site/biblioteca/">Biblioteca</a>

</div>

</div>

<!-- FORMULARIO -->

<div class="container">

<h2>Solicitar Elaboración de SOP</h2>

<form id="sopForm">

<input type="text" id="empleado" placeholder="Empleado" required>

<input type="text" id="departamento" placeholder="Departamento" required>

<input type="text" id="objetivo" placeholder="Objetivo SOP" required>

<input type="text" id="areas" placeholder="Áreas involucradas">

<textarea id="resumen" placeholder="Resumen del proceso"></textarea>

<input type="file" id="archivos" multiple>

<button type="submit">Enviar Solicitud</button>

</form>

</div>

<!-- GRID -->

<div class="grid-container">

<h2>Solicitudes</h2>

<table>

<thead>

<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaSOP"></tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("iR8ieJnOkI4_sr8TH")

let solicitudes=JSON.parse(localStorage.getItem("sopSolicitudes"))||[]

function guardar(){
localStorage.setItem("sopSolicitudes",JSON.stringify(solicitudes))
}

function toggleMenu(){
document.querySelector(".menu").classList.toggle("show")
}

function renderTabla(){

const tabla=document.getElementById("tablaSOP")

tabla.innerHTML=""

solicitudes.forEach((sop,index)=>{

let clase="pendiente"

if(sop.estado==="Trámite")clase="tramite"
if(sop.estado==="Rechazado")clase="rechazado"
if(sop.estado==="Aprobado")clase="aprobado"

let fila=document.createElement("tr")

fila.innerHTML=`

<td>${sop.empleado}</td>
<td>${sop.departamento}</td>
<td>${sop.objetivo}</td>
<td>${sop.areas}</td>

<td>
<span class="estado ${clase}">
${sop.estado}
</span>
</td>

<td>

<button onclick="tramite(${index})">
<i class="fa fa-spinner"></i>
</button>

<button onclick="aprobar(${index})">
<i class="fa fa-check"></i>
</button>

<button onclick="rechazar(${index})">
<i class="fa fa-x"></i>
</button>

<button onclick="eliminar(${index})">
<i class="fa fa-trash"></i>
</button>

</td>
`

tabla.appendChild(fila)

})

}

document.getElementById("sopForm").addEventListener("submit",function(e){

e.preventDefault()

let archivos=document.getElementById("archivos").files

let listaArchivos=""

for(let i=0;i<archivos.length;i++){
listaArchivos+=archivos[i].name+"<br>"
}

let nuevo={

empleado:empleado.value,
departamento:departamento.value,
objetivo:objetivo.value,
areas:areas.value,
resumen:resumen.value,
estado:"Pendiente"

}

solicitudes.push(nuevo)

guardar()

renderTabla()

let params={

empleado:empleado.value,
departamento:departamento.value,
objetivo:objetivo.value,
areas:areas.value,
resumen:resumen.value,
archivosHTML:listaArchivos

}

emailjs.send(
"service_vkt5xuo",
"template_vc7447e",
params
)

.then(()=>alert("Solicitud enviada"))

.catch(err=>{
console.log(err)
alert("Error enviando correo")
})

this.reset()

})

function tramite(i){

solicitudes[i].estado="Trámite"
guardar()
renderTabla()

}

function aprobar(i){

solicitudes[i].estado="Aprobado"
guardar()
renderTabla()

}

function rechazar(i){

solicitudes[i].estado="Rechazado"
guardar()
renderTabla()

}

function eliminar(i){

if(confirm("Eliminar solicitud?")){

solicitudes.splice(i,1)

guardar()

renderTabla()

}

}

renderTabla()

</script>

</body>
</html>
