<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar SOP - Artemisa Marble & Cabinets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:#f0f0f0; }
.container { max-width:700px; margin:50px auto; padding:20px; background:white; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
h1 { text-align:center; color:#005a9e; }
form { display:flex; flex-direction:column; gap:15px; }
input, textarea, select, button { padding:12px; border-radius:8px; border:1px solid #ccc; font-size:1rem; width:100%; }
button { background:#0072C6; color:white; border:none; cursor:pointer; transition:0.3s; font-weight:bold; }
button:hover { background:#005a9e; }
</style>
</head>
<body>

<div class="container">
<h1>Registrar Nuevo SOP</h1>
<form action="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/formResponse" method="POST" target="_blank">
  <input type="text" name="entry.123456789" placeholder="Nombre del SOP" required>
  <input type="text" name="entry.987654321" placeholder="Departamento" required>
  <textarea name="entry.1122334455" rows="6" placeholder="Descripción / Requerimientos" required></textarea>
  <input type="url" name="entry.5566778899" placeholder="Enlace a archivos (si aplica)">
  <button type="submit">Enviar SOP</button>
</form>
</div>

</body>
</html>
