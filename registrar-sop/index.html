<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar SOP - ARTEMISA MARBLE & CABINETS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nuevo&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:url('/sop-site/kitchen15.jpeg') no-repeat center top;background-size:cover;}
.overlay{background:rgba(0,0,0,0.25);min-height:100vh;}
.navbar{position:sticky;top:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);padding:10px 30px;color:white;font-weight:bold;font-family:'Nuevo','Segoe UI',Arial;display:flex;justify-content:space-between;align-items:center;z-index:999;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.menu{display:flex;gap:20px;}
.menu a{color:white;text-decoration:none;font-weight:bold;transition:.3s;}
.menu a:hover{color:#00aaff;}
.menu-toggle{display:none;font-size:1.5rem;cursor:pointer;}
.container{max-width:900px;margin:50px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
h1{text-align:center;margin-bottom:25px;color:#003366;}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-size:1rem;}
button{padding:12px;border:none;border-radius:30px;background:linear-gradient(135deg,#0072C6,#005a9e);color:white;font-weight:bold;cursor:pointer;transition:.3s;}
button:hover{transform:scale(1.05);}
.grid-container{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#003366;color:white;}
.estado{padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
.pendiente{background:#fff3cd;color:#856404;}
.tramite{background:#cce5ff;color:#004085;}
.aprobado{background:#d4edda;color:#155724;}
.rechazado{background:#f8d7da;color:#721c24;}
.footer{text-align:center;padding:30px;color:white;background:#003366;margin-top:50px;}
@media(max-width:768px){
.menu{display:none;flex-direction:column;background:rgba(0,0,0,0.85);position:absolute;top:60px;right:0;width:200px;padding:20px;border-radius:10px 0 0 10px;}
.menu.show{display:flex;}
.menu-toggle{display:block;}
}
</style>
</head>
<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">
<img src="/sop-site/logo.png">
<span>ARTEMISA MARBLE & CABINETS</span>
</div>
<div class="menu-toggle" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</div>
<div class="menu">
<a href="/sop-site/">Inicio</a>
<a href="/sop-site/registrar-sop/">Registrar SOP</a>
<a href="/sop-site/biblioteca/">Biblioteca SOP</a>
</div>
</div>

<!-- FORMULARIO -->
<div class="container">
<h1>Registrar Solicitud de SOP</h1>
<form id="sopForm">
<input type="text" id="empleado" placeholder="Nombre del empleado" required>
<input type="text" id="departamento" placeholder="Área / Departamento" required>
<input type="text" id="objetivo" placeholder="Objetivo del SOP" required>
<input type="text" id="areas" placeholder="Áreas o roles involucrados">
<textarea id="resumen" rows="4" placeholder="Resumen de instrucciones"></textarea>
<input type="file" id="archivos" multiple>
<button type="submit">Registrar Solicitud</button>
</form>
</div>

<!-- GRID -->
<div class="grid-container">
<h2>Solicitudes SOP</h2>
<table>
<thead>
<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaSOP"></tbody>
</table>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 ARTEMISA MARBLE & CABINETS
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>
<script>
// MENU MOVIL
function toggleMenu(){document.querySelector(".menu").classList.toggle("show")}

// SISTEMA SOP
let solicitudes = JSON.parse(localStorage.getItem("sopSolicitudes")) || [];
function guardar(){localStorage.setItem("sopSolicitudes", JSON.stringify(solicitudes))}
function renderTabla(){
const tabla=document.getElementById("tablaSOP"); tabla.innerHTML="";
solicitudes.forEach((sop,index)=>{
let fila=document.createElement("tr");
fila.innerHTML=`
<td>${sop.empleado}</td>
<td>${sop.departamento}</td>
<td>${sop.objetivo}</td>
<td>${sop.areas}</td>
<td><span class="estado ${sop.estado.toLowerCase()}">${sop.estado}</span></td>
<td>
<button onclick="cambiarEstado(${index},'Trámite')"><i class="fa fa-spinner"></i></button>
<button onclick="cambiarEstado(${index},'Aprobado')"><i class="fa fa-check"></i></button>
<button onclick="cambiarEstado(${index},'Rechazado')"><i class="fa fa-times"></i></button>
</td>
`;
tabla.appendChild(fila);
})
}
function cambiarEstado(i,estado){solicitudes[i].estado=estado; guardar(); renderTabla();}

// EmailJS
emailjs.init("TU_USER_ID_EMAILJS"); // reemplaza con tu User ID de EmailJS

document.getElementById("sopForm").addEventListener("submit",function(e){
e.preventDefault();
let nuevo={
empleado:empleado.value,
departamento:departamento.value,
objetivo:objetivo.value,
areas:areas.value,
resumen:resumen.value,
estado:"Pendiente"
};
solicitudes.push(nuevo);
guardar();
renderTabla();
this.reset();

// Leer archivos y enviar correo con base64 + nombres
let archivosInput = document.getElementById("archivos");
let attachments = [];

if(archivosInput.files.length>0){
  let filesProcessed = 0;
  for(let i=0;i<archivosInput.files.length;i++){
    let file = archivosInput.files[i];
    let reader = new FileReader();
    reader.onload = function(e){
      attachments.push({name:file.name, data:e.target.result.split(',')[1]});
      filesProcessed++;
      if(filesProcessed === archivosInput.files.length){
        enviarCorreo(attachments);
      }
    }
    reader.readAsDataURL(file);
  }
}else{
  enviarCorreo([]);
}

function enviarCorreo(attachmentsList){
  // Generar HTML de los archivos para mostrar en el email
  let archivosHTML = "";
  attachmentsList.forEach(f=>{
    archivosHTML += `<p><strong>${f.name}</strong></p>`;
  });

  let templateParams={
    empleado:nuevo.empleado,
    departamento:nuevo.departamento,
    objetivo:nuevo.objetivo,
    areas:nuevo.areas,
    resumen:nuevo.resumen,
    archivosHTML:archivosHTML,
    attachments: attachmentsList // EmailJS lo tomará como attachments
  };

  emailjs.send("service_vkt5xuo","template_vc7447e",templateParams)
    .then(res=>{alert("Solicitud registrada y correo enviado con éxito!");})
    .catch(err=>{alert("Error enviando correo: "+err);});
}

});

renderTabla();
</script>
</body>

</html>
