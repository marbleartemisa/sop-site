<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar SOP - ARTEMISA MARBLE & CABINETS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nuevo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
/* ==== Estilos ==== */
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:url('/sop-site/wall5.png') no-repeat center top;background-size:cover;}
.overlay{background:rgba(0,0,0,0.25);min-height:100vh;}
.navbar{position:sticky;top:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);padding:10px 30px;color:white;font-weight:bold;display:flex;justify-content:space-between;align-items:center;z-index:999;font-family:'Nuevo','Segoe UI',Arial;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}
.menu{display:flex;gap:25px;}
.menu a{color:white;text-decoration:none;font-weight:bold;transition:.3s;}
.menu a:hover{color:#00aaff;transform:scale(1.05);}
.menu-toggle{display:none;font-size:1.6rem;cursor:pointer;}
.container{max-width:900px;margin:50px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
h1{text-align:center;margin-bottom:25px;color:#003366;}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-size:1rem;height:46px;}
textarea{height:auto;}
button{padding:12px;border:none;border-radius:30px;background:linear-gradient(135deg,#0072C6,#005a9e);color:white;font-weight:bold;cursor:pointer;transition:.3s;}
button:hover{transform:scale(1.05);}
.grid-container{max-width:1100px;margin:40px auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:30px;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#003366;color:white;}
.estado{padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
.pendiente{background:#fff3cd;color:#856404;}
.tramite{background:#cce5ff;color:#004085;}
.rechazado{background:#f8d7da;color:#721c24;}
.aprobado{background:#d4edda;color:#155724;}
.footer{text-align:center;padding:30px;color:white;background:#003366;margin-top:50px;}
.notification{position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:12px;color:white;font-weight:bold;box-shadow:0 5px 20px rgba(0,0,0,0.3);z-index:9999;opacity:0.95;}
.notification.success{background:#28a745;}
.notification.error{background:#dc3545;}
@media(max-width:768px){.menu{display:none;flex-direction:column;background:rgba(0,0,0,0.9);position:absolute;top:60px;right:0;width:200px;padding:20px;border-radius:10px 0 0 10px;}.menu.show{display:flex;}.menu-toggle{display:block;}}
.spinner{margin-left:8px;}
</style>
</head>
<body>
<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="/sop-site/logo.png">
    <span>ARTEMISA MARBLE & CABINETS</span>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
  <div class="menu">
    <a href="/sop-site/">Inicio</a>
    <a href="/sop-site/registrar-sop/">Registrar SOP</a>
    <a href="/sop-site/biblioteca/">Biblioteca SOP</a>
  </div>
</div>

<!-- FORMULARIO -->
<div class="container">
<h1>Registrar Solicitud de SOP - Merge Seguro</h1>
<form id="sopForm" enctype="multipart/form-data">

<label>Empleado</label>
<select id="employee" required>
<option value="">Seleccione empleado</option>
<option value="Damian Molina|damian@artemisamarble.com|Presidente|Ventas">Damian Molina - Presidente</option>
<option value="Alberto Molina|frontdesk@artemisamarble.com|Frontdesk|Administracion">Alberto Molina - Frontdesk</option>
<!-- ... otros empleados ... -->
<option value="Otros|otros|otros|otros">Otros</option>
</select>

<input type="text" id="departamento" placeholder="Área / Departamento" required>
<input type="text" id="objetivo" placeholder="Objetivo del SOP" required>
<input type="text" id="areas" placeholder="Áreas o roles involucrados" required>
<textarea id="resumen" rows="4" placeholder="Resumen de instrucciones" required></textarea>
<label>Adjuntar archivos (PDF o imágenes)</label>
<input type="file" id="archivos" multiple>

<button type="submit" id="btnEnviar">
  <span class="btn-text">Registrar Solicitud</span>
  <span class="spinner" style="display:none;"><i class="fa fa-spinner fa-spin"></i></span>
</button>
</form>
</div>

<!-- GRID -->
<div class="grid-container">
<h2>Solicitudes SOP</h2>
<input type="text" id="buscarSOP" placeholder="Buscar..." style="margin-bottom:15px;padding:8px;width:100%;border-radius:8px;border:1px solid #ccc;">
<select id="filtroEstado" style="margin-bottom:15px;padding:8px;border-radius:8px;border:1px solid #ccc;">
<option value="">Todos los estados</option>
<option value="Pendiente">Pendiente</option>
<option value="Trámite">Trámite</option>
<option value="Rechazado">Rechazado</option>
<option value="Aprobado">Aprobado</option>
</select>
<table>
<thead>
<tr>
<th>Empleado</th>
<th>Departamento</th>
<th>Objetivo</th>
<th>Áreas</th>
<th>Estado</th>
<th>Fecha / Hora</th>
<th>Archivos</th>
</tr>
</thead>
<tbody id="tablaSOP"></tbody>
</table>
</div>

<div class="footer">
© 2026 ARTEMISA MARBLE & CABINETS
</div>
</div>

<script>
emailjs.init("iR8ieJnOkI4_sr8TH")
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyPqhX5zZou4XmrMZSbcbHK8qBSTkdVUCXe7mdKWkEwduNeUZFaj0XBc8CpfNr6eq_P/exec"

function toggleMenu(){document.querySelector('.menu').classList.toggle('show')}

// Notificaciones
function mostrarNotificacion(msg,tipo){
  const notif=document.createElement("div")
  notif.className="notification "+tipo
  notif.innerHTML=msg
  document.body.appendChild(notif)
  setTimeout(()=>notif.remove(),4000)
}

// Autocompleta departamento
document.getElementById("employee").addEventListener("change",function(){
  let datos=this.value.split("|")
  document.getElementById("departamento").value=datos[3] || ""
})

// Convertir archivos a Base64
function archivosA_Base64(files){
  return Promise.all(Array.from(files).map(file=>{
    return new Promise((resolve,reject)=>{
      const reader=new FileReader()
      reader.onload=()=>resolve({name:file.name,data:reader.result})
      reader.onerror=reject
      reader.readAsDataURL(file)
    })
  }))
}

// Subir archivos + guardar en Sheet
async function enviarSolicitud(formData){
  let archivosInput = document.getElementById("archivos")
  let archivosBase64 = []
  if(archivosInput.files.length>0){
    archivosBase64 = await archivosA_Base64(archivosInput.files)
  }

  // Construir payload correcto
  let payload = {
    action: "add",
    employee: formData.nombre,
    correo: formData.correo,
    cargo: formData.cargo,
    departamento: formData.depto,
    objetivo: formData.objetivo,
    areas: formData.areas,
    resumen: formData.resumen,
    fecha: formData.fechaActual,
    files: archivosBase64
  }

  // ⚡ Aquí usamos payload directamente
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  })
  const data = await res.json()
  return data
}

// ENVÍO FORMULARIO
const btn = document.getElementById("btnEnviar")
const btnText = btn.querySelector(".btn-text")
const spinner = btn.querySelector(".spinner")

document.getElementById("sopForm").addEventListener("submit", async function(e){
  e.preventDefault()

  let datosEmpleado = document.getElementById("employee").value.split("|")
  let nombre = datosEmpleado[0], correo = datosEmpleado[1], cargo = datosEmpleado[2], depto = datosEmpleado[3]
  let objetivo = document.getElementById("objetivo").value.trim()
  let areas = document.getElementById("areas").value.trim()
  let resumen = document.getElementById("resumen").value.trim()
  let fechaActual = new Date().toLocaleString()

  if(!nombre || !depto || !objetivo || !areas || !resumen){
    mostrarNotificacion("Complete todos los campos obligatorios","error")
    return
  }

  btn.disabled=true
  btnText.innerText="Enviando..."
  spinner.style.display="inline-block"

  try{
    let result = await enviarSolicitud({nombre,correo,cargo,depto,objetivo,areas,resumen,fechaActual})

    let archivosHTML = result.fileLinks && result.fileLinks.length>0
      ? result.fileLinks.map(f=>`<p>📎 <a href="${f}" target="_blank">${f.split("/").pop()}</a></p>`).join("")
      : "<p>No se adjuntaron archivos</p>"

    // Enviar correo
    await emailjs.send("service_vkt5xuo","template_vc7447e",{
      employee: nombre,
      department: depto,
      cargo: cargo,
      objective: objetivo,
      areas: areas,
      summary: resumen,
      date: fechaActual,
      files: archivosHTML
    })

    mostrarNotificacion("Solicitud enviada correctamente","success")

  }catch(err){
    console.error(err)
    mostrarNotificacion("Error enviando solicitud, revise consola","error")
  }finally{
    btn.disabled=false
    btnText.innerText="Registrar Solicitud"
    spinner.style.display="none"
    this.reset()
  }
})
</script>
</body>
</html>
