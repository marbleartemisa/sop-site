<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producción - ARTEMISA MARBLE & CABINETS</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f6f9;
}

/* Overlay opcional */
.overlay {
    min-height: 100vh;
    padding: 0 20px;
}

/* Banner */
.banner {
    text-align: center;
    padding: 40px 20px 20px 20px;
    background: linear-gradient(to right, #0072C6, #005a9e);
    color: white;
    border-radius: 12px;
    margin-top: 20px;
}

.banner h1 {
    margin: 0;
    font-size: 2.2rem;
}

.banner p {
    margin: 5px 0;
    font-size: 1rem;
    opacity: 0.9;
}

/* Botón volver al inicio */
.home-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 25px;
    border-radius: 25px;
    background: #003366;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.home-btn:hover {
    opacity: 0.9;
}

/* Buscador interno */
.search-container {
    text-align: center;
    margin: 25px 0;
}

.search-container input {
    width: 90%;
    max-width: 400px;
    padding: 12px 16px;
    border-radius: 30px;
    border: 1px solid #ccc;
    font-size: 1rem;
    outline: none;
}

/* Contenedor tarjetas SOP */
.container {
    max-width: 900px;
    margin: 0 auto 50px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
}

/* Tarjetas SOP */
.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    text-decoration: none;
    color: #1f2937;
    font-weight: 600;
    font-size: 1rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}
</style>
</head>

<body>
<div class="overlay">

<!-- Banner -->
<div class="banner">
    <h1>Producción - ARTEMISA MARBLE & CABINETS</h1>
    <p>Procedimientos y SOP de Producción</p>
    <a href="../index.html" class="home-btn">⬅ Volver al Menú Principal</a>
</div>

<!-- Buscador SOP -->
<div class="search-container">
    <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Buscar SOP...">
</div>

<!-- Contenedor SOP -->
<div class="container" id="cardContainer">
    <a href="SOP CARPINTERIA COMPRA STOCK V1-02.html" class="card">📄 Compra Stock Carpintería</a>
    <a href="SOP COMPRA DE EDGEBANDING final.html" class="card">📄 Compra de Edgebanding</a>
    <a href="SOP CUIDADO DE HERRAMIENTAS DE CARPINTERIA.html" class="card">📄 Cuidado de Herramientas</a>
    <a href="SOP NIVELES INICIALES version 1-0.html" class="card">📄 Niveles Iniciales</a>
</div>

</div>

<script>
function filterCards() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");
    cards.forEach(card => {
        let text = card.textContent.toLowerCase();
        card.style.display = text.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
