<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producción - SOP</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
}

h1 {
    text-align:center;
    margin-top:30px;
    color:#003366;
}

/* Contenedor de tarjetas */
.container {
    max-width: 900px;
    margin: 40px auto;          /* centra el grid horizontalmente */
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 0 20px;            /* espacio a los lados */
    justify-items: center;       /* centra cada tarjeta dentro del grid */
}

/* Tarjetas */
.card {
    width: 100%;
    max-width: 250px;
    background: white;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    text-decoration: none;
    color: #1f2937;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 35px rgba(0,0,0,0.25);
}

/* Responsive */
@media (max-width: 500px) {
    .card {
        max-width: 90%;
        padding: 20px;
    }
}
</style>
</head>
<body>

<h1>Producción - SOP</h1>

<div class="container">
    <a href="SOP-CARPINTERIA-COMPRA-STOCK/" class="card">📄 Compra por Stock Mínimo</a>
    <a href="SOP-COMPRA-EDGEBANDING/" class="card">📄 Compra de Edgebanding</a>
    <a href="SOP-CUIDADO-HERRAMIENTAS-CARPINTERIA/" class="card">📄 Cuidado de Herramientas de Carpintería</a>
    <a href="SOP-NIVELES-INICIALES/" class="card">📄 Niveles Iniciales</a>
   
</div>

</body>
</html>
