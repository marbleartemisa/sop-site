<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producción - ARTEMISA MARBLE & CABINETS</title>
<style>
body { font-family:'Segoe UI',Arial,sans-serif; margin:0; padding:0; background:#f4f6f9; }
.container { max-width:1000px; margin:40px auto; padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
.card { background:white; border-radius:15px; padding:20px; text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.08); text-decoration:none; color:#1f2937; font-weight:600; transition: all 0.3s ease; }
.card:hover { transform: translateY(-5px); box-shadow:0 12px 30px rgba(0,0,0,0.15); }
.back { display:inline-block; margin:30px 0 10px 0; padding:10px 20px; background:#0072C6; color:white; border-radius:25px; text-decoration:none; font-weight:bold; transition:0.3s; }
.back:hover { opacity:0.9; }
.search-container { text-align:center; margin-bottom:20px; }
.search-container input { width:90%; max-width:400px; padding:12px 15px; border-radius:25px; border:1px solid #ccc; outline:none; }
</style>
</head>
<body>

<div class="search-container">
  <input type="text" id="searchInput" onkeyup="filterCards()" placeholder="Buscar SOP en Producción...">
</div>

<div class="container" id="cardContainer">
  <a href="SOP1.html" class="card">📄 SOP 1: Procedimiento Corte Mármol</a>
  <a href="SOP2.html" class="card">⚙️ SOP 2: Proceso de Pulido</a>
  <a href="SOP3.html" class="card">🔧 SOP 3: Instalación en Obra</a>
  <!-- Agrega todas tus SOP aquí -->
</div>

<div style="text-align:center;">
  <a href="../" class="back">⬅ Volver al Menú Principal</a>
</div>

<script>
function filterCards() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    let text = card.textContent.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
